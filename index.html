// ─── UTILS ───────────────────────────────────────────────────────────────────
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}

async function fbGet(p){try{const r=await fetch(`${FIREBASE_URL}/${p}.json`);return await r.json()}catch{return null}}
async function fbSet(p,v){try{await fetch(`${FIREBASE_URL}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)})}catch{}}
async function fbPush(p,v){try{const r=await fetch(`${FIREBASE_URL}/${p}.json`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});return await r.json()}catch{return null}}
async function fbDelete(p){try{await fetch(`${FIREBASE_URL}/${p}.json`,{method:"DELETE"})}catch{}}

function loadLocal(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function saveLocal(k,v){try{if(v===null)localStorage.removeItem(k);else localStorage.setItem(k,JSON.stringify(v))}catch{}}

function getDeviceId(){let id=localStorage.getItem("vonerlec:deviceId");if(!id){id="dev_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem("vonerlec:deviceId",id)}return id}
function deviceDejaPointe(cId,type){const t=new Date().toDateString();const h=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");return h.find(x=>x.deviceId===getDeviceId()&&x.chantierId===cId&&x.date===t&&x.type===type)}
function enregistrerDevice(cId,code,type){const t=new Date().toDateString();const h=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");const r=h.filter(x=>(new Date()-new Date(x.date))<30*86400000);r.push({deviceId:getDeviceId(),chantierId:cId,date:t,code,type,ts:new Date().toISOString()});localStorage.setItem("vonerlec:device_pointage",JSON.stringify(r))}
function etatJourDevice(cId){const t=new Date().toDateString();const h=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");const d=getDeviceId();const e=h.filter(x=>x.deviceId===d&&x.chantierId===cId&&x.date===t);if(e.some(x=>x.type==="entree")&&e.some(x=>x.type==="sortie"))return"les_deux";if(e.some(x=>x.type==="entree"))return"entree";return null}

function haversineDistance(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function generateToken(id,v){const s=`${id}::v${v}::${SECRET}`;let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return Math.abs(h>>>0).toString(36).toUpperCase().padStart(8,"0")}
function fmt(ts,mode="time"){const d=new Date(ts);if(mode==="time")return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});if(mode==="date")return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"});if(mode==="dateFull")return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});return d.toLocaleString("fr-FR")}
function encodeQRData(ch){const v=ch.qrVersion||1,t=generateToken(ch.id,v);return btoa(unescape(encodeURIComponent(JSON.stringify({i:ch.id,t,v,n:ch.nom,a:ch.adresse||"",la:ch.lat,lo:ch.lon,r:ch.rayon,c:ch.couleur}))))}
function decodeQRData(hash){try{if(!hash.startsWith("#badge/"))return null;const d=JSON.parse(decodeURIComponent(escape(atob(hash.replace("#badge/","")))));if(d.t!==generateToken(d.i,d.v))return null;return{id:d.i,nom:d.n,adresse:d.a,lat:d.la,lon:d.lo,rayon:d.r,couleur:d.c,qrVersion:d.v}}catch{return null}}
function nomCle(nom,prenom){return(nom+"_"+prenom).toUpperCase()}

// ─── GPS AMÉLIORÉ ────────────────────────────────────────────────────────────
function getAccuratePosition(timeout=12000){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("GPS non disponible"));return}
    let best=null;
    const wid=navigator.geolocation.watchPosition(pos=>{
      if(!best||pos.coords.accuracy<best.coords.accuracy)best=pos;
      if(pos.coords.accuracy<25){navigator.geolocation.clearWatch(wid);resolve(best)}
    },err=>{navigator.geolocation.clearWatch(wid);if(best)resolve(best);else reject(err)},{enableHighAccuracy:true,timeout,maximumAge:0});
    setTimeout(()=>{navigator.geolocation.clearWatch(wid);if(best)resolve(best);else reject(new Error("GPS timeout"))},timeout);
  });
}

// ─── COMPRESSION PHOTO ───────────────────────────────────────────────────────
function compressPhoto(file,maxW=480,quality=0.45){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const ratio=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*ratio;c.height=img.height*ratio;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',quality))};img.onerror=reject;img.src=e.target.result};
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}

// ─── EPI LOGIC ───────────────────────────────────────────────────────────────
function epiRequis(lastEpiDate,frequence){
  if(!lastEpiDate)return true;
  const now=new Date(),last=new Date(lastEpiDate);
  const diffDays=Math.floor((now-last)/(86400000));
  if(frequence==="jour")return diffDays>=1;
  if(frequence==="semaine")return diffDays>=7;
  if(frequence==="mois")return diffDays>=30;
  return false;
}
function joursDepuisEpi(lastDate){if(!lastDate)return 999;return Math.floor((new Date()-new Date(lastDate))/86400000)}

// ─── EXCEL EXPORT ────────────────────────────────────────────────────────────
function exporterExcel(pointages,chantiers,salaries){
  const grouped={};
  pointages.forEach(p=>{
    const sal=salaries.find(s=>s.code===p.code)||{nom:p.nom||"?",prenom:p.prenom||"?"};
    const dateStr=new Date(p.timestamp).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
    const key=`${p.code}__${dateStr}__${p.chantierId}`;
    if(!grouped[key])grouped[key]={code:p.code,nom:sal.nom,prenom:sal.prenom,chantier:p.chantierNom,date:dateStr,entree:null,sortie:null,distE:null,distS:null,manE:false,manS:false};
    if(p.type!=="sortie"&&!grouped[key].entree){grouped[key].entree=fmt(p.timestamp);grouped[key].distE=p.distance;grouped[key].manE=!!p.manuel}
    if(p.type==="sortie"&&!grouped[key].sortie){grouped[key].sortie=fmt(p.timestamp);grouped[key].distS=p.distance;grouped[key].manS=!!p.manuel}
  });
  const lignes=Object.values(grouped).map(g=>{
    let duree="";
    if(g.entree&&g.sortie){try{const[he,me]=g.entree.split(":");const[hs,ms]=g.sortie.split(":");const dm=(parseInt(hs)*60+parseInt(ms))-(parseInt(he)*60+parseInt(me));if(dm>0)duree=`${Math.floor(dm/60)}h${(dm%60).toString().padStart(2,"0")}`}catch{}}
    return{"Date":g.date,"Code":g.code,"Nom":g.nom,"Prénom":g.prenom,"Chantier":g.chantier,"Arrivée":g.entree||"—","Départ":g.sortie||"—","Durée":duree||"—","GPS Arr.(m)":g.distE!=null?g.distE:"—","GPS Dép.(m)":g.distS!=null?g.distS:"—","Manuel":(g.manE||g.manS)?"Oui":"Non"}
  });
  lignes.sort((a,b)=>{const[da,ma,ya]=a["Date"].split("/");const[db,mb,yb]=b["Date"].split("/");const dA=new Date(`${ya}-${ma}-${da}`),dB=new Date(`${yb}-${mb}-${db}`);return dB-dA||a["Nom"].localeCompare(b["Nom"])});
  const ws=XLSX.utils.json_to_sheet(lignes);ws["!cols"]=[{wch:12},{wch:8},{wch:16},{wch:14},{wch:22},{wch:8},{wch:8},{wch:8},{wch:12},{wch:12},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Pointages");
  // Résumé
  const rMap={};lignes.forEach(l=>{const k=l["Code"];if(!rMap[k])rMap[k]={"Code":l["Code"],"Nom":l["Nom"],"Prénom":l["Prénom"],jours:0,totalMin:0};rMap[k].jours++;if(l["Durée"]!=="—"){const m=l["Durée"].match(/(\d+)h(\d+)/);if(m)rMap[k].totalMin+=parseInt(m[1])*60+parseInt(m[2])}});
  const resume=Object.values(rMap).map(r=>({"Code":r["Code"],"Nom":r["Nom"],"Prénom":r["Prénom"],"Jours pointés":r.jours,"Heures totales":r.totalMin>0?`${Math.floor(r.totalMin/60)}h${(r.totalMin%60).toString().padStart(2,"0")}`:"—"}));
  const ws2=XLSX.utils.json_to_sheet(resume);ws2["!cols"]=[{wch:8},{wch:16},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws2,"Résumé salariés");
  XLSX.writeFile(wb,`Vonerlec_Rapport_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.xlsx`);
}

// ─── COMPOSANTS BASE ─────────────────────────────────────────────────────────
function Btn({children,onClick,variant="primary",disabled,small,full,style:s}){
  const base={display:"inline-flex",alignItems:"center",gap:8,justifyContent:"center",borderRadius:10,fontWeight:600,border:"none",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"all .15s",padding:small?"8px 14px":"12px 22px",fontSize:small?12:14,width:full?"100%":undefined,...s};
  const v={primary:{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",color:"#fff",boxShadow:"0 2px 12px rgba(255,90,31,.25)"},secondary:{background:"#1C1F35",color:"#bbb",border:"1.5px solid #252840"},danger:{background:"#2a1218",color:"#fc5c65",border:"1.5px solid #fc5c6533"},success:{background:"#0f2a1f",color:"#26de81",border:"1.5px solid #26de8133"},ghost:{background:"transparent",color:"#666",border:"1.5px solid #252840"},warning:{background:"#2a2010",color:"#F7B731",border:"1.5px solid #F7B73133"}};
  return <button style={{...base,...v[variant]}} onClick={disabled?undefined:onClick}>{children}</button>;
}
function Tag({color,children}){return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:color+"18",color,fontSize:11,fontWeight:600,border:`1px solid ${color}33`,letterSpacing:.3}}>{children}</span>}
function Modal({children,onClose,width=520}){
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={onClose}><div className="anim" style={{background:"#12131E",borderRadius:18,padding:28,width:"100%",maxWidth:width,border:"1px solid #252840",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.6)"}} onClick={e=>e.stopPropagation()}>{children}</div></div>);
}
function Toast({msg,sub,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,5000);return()=>clearTimeout(t)},[]);
  return(<div onClick={onClose} style={{position:"fixed",top:16,left:"50%",zIndex:2000,background:"#0f2a1f",border:"1.5px solid #26de81",borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,minWidth:280,maxWidth:400,boxShadow:"0 12px 40px rgba(0,0,0,.6)",cursor:"pointer",animation:"slideDown .4s ease forwards"}}><div style={{position:"relative",flexShrink:0}}><div style={{width:10,height:10,borderRadius:"50%",background:"#26de81"}}/><div style={{position:"absolute",inset:0,borderRadius:"50%",background:"#26de81",animation:"ping 1.2s ease-out infinite"}}/></div><div><div style={{color:"#26de81",fontWeight:700,fontSize:14}}>{msg}</div>{sub&&<div style={{color:"#26de8188",fontSize:12,marginTop:2}}>{sub}</div>}</div><div style={{marginLeft:"auto",color:"#26de8144",fontSize:20}}>×</div></div>);
}

// ─── PAGE EPI (SALARIÉ) ──────────────────────────────────────────────────────
function EpiCapturePage({salarie,chantierId,chantierNom,onComplete,onSkip}){
  const[step,setStep]=useState(0);
  const[photos,setPhotos]=useState({});
  const[uploading,setUploading]=useState(false);
  const fileRef=useRef();
  const current=EPI_ITEMS[step];

  async function handlePhoto(e){
    const file=e.target.files?.[0];if(!file)return;
    try{
      const compressed=await compressPhoto(file);
      const updated={...photos,[current.id]:compressed};
      setPhotos(updated);
      if(step<EPI_ITEMS.length-1)setTimeout(()=>setStep(step+1),400);
    }catch{alert("Erreur lors de la compression de la photo")}
  }

  async function soumettre(){
    setUploading(true);
    const epiRecord={code:salarie.code,nom:salarie.nom,prenom:salarie.prenom,chantierId,chantierNom,timestamp:new Date().toISOString(),photos};
    await fbPush("epi",epiRecord);
    setUploading(false);
    onComplete();
  }

  const progress=Object.keys(photos).length;
  const allDone=progress===EPI_ITEMS.length;

  return(
    <div style={{minHeight:"100vh",background:"#0B0C14",padding:16,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <style>{css}</style>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{background:"linear-gradient(135deg,#F7B731,#FF5A1F)",padding:"18px 20px",borderRadius:"16px 16px 0 0"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#fff",opacity:.8}}>CONTRÔLE EPI</div>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800,color:"#fff",marginTop:2}}>🛡️ Point Sécurité</div>
          <div style={{fontSize:12,color:"#ffffff88",marginTop:4}}>{salarie.prenom} {salarie.nom} · {chantierNom}</div>
        </div>
        <div style={{background:"#12131E",borderRadius:"0 0 16px 16px",padding:20,border:"1px solid #252840",borderTop:"none"}}>
          {/* Progress bar */}
          <div style={{display:"flex",gap:3,marginBottom:20}}>
            {EPI_ITEMS.map((item,i)=>(
              <div key={item.id} style={{flex:1,height:4,borderRadius:2,background:photos[item.id]?"#26de81":i===step?"#FF5A1F":"#252840",transition:"all .3s"}}/>
            ))}
          </div>
          <div style={{color:"#666",fontSize:12,marginBottom:12,textAlign:"center"}}>{progress}/{EPI_ITEMS.length} photos prises</div>

          {!allDone?(
            <div className="anim" key={step}>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:56,marginBottom:8}}>{current.icon}</div>
                <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700}}>Photographiez : {current.label}</div>
                <div style={{color:"#666",fontSize:13,marginTop:6}}>Prenez une photo nette de l'équipement</div>
              </div>

              {photos[current.id]?(
                <div style={{textAlign:"center"}}>
                  <img src={photos[current.id]} alt={current.label} style={{width:"100%",maxWidth:280,borderRadius:12,border:"2px solid #26de81",marginBottom:12}}/>
                  <div style={{color:"#26de81",fontWeight:600,fontSize:13,marginBottom:12}}>✅ Photo enregistrée</div>
                  <div style={{display:"flex",gap:8}}>
                    <Btn full variant="ghost" small onClick={()=>fileRef.current?.click()}>📷 Reprendre</Btn>
                    {step<EPI_ITEMS.length-1&&<Btn full small onClick={()=>setStep(step+1)}>Suivant →</Btn>}
                  </div>
                </div>
              ):(
                <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:24,borderRadius:14,border:"2px dashed #FF5A1F44",background:"#FF5A1F08",color:"#FF5A1F",fontWeight:700,fontSize:16,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  📷 Prendre la photo
                  <span style={{fontSize:12,fontWeight:400,color:"#666"}}>Appuyez pour ouvrir la caméra</span>
                </button>
              )}
              <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>

              {/* Navigation steps */}
              <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap",justifyContent:"center"}}>
                {EPI_ITEMS.map((item,i)=>(
                  <button key={item.id} onClick={()=>setStep(i)} style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${photos[item.id]?"#26de81":i===step?"#FF5A1F":"#252840"}`,background:photos[item.id]?"#26de8118":i===step?"#FF5A1F18":"transparent",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} title={item.label}>
                    {photos[item.id]?"✅":item.icon}
                  </button>
                ))}
              </div>
            </div>
          ):(
            <div className="pop" style={{textAlign:"center"}}>
              <div style={{fontSize:60,marginBottom:8}}>🎉</div>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#26de81",fontWeight:700}}>Toutes les photos sont prises !</div>
              <div style={{color:"#666",fontSize:13,marginTop:6,marginBottom:18}}>Validez pour enregistrer votre contrôle EPI</div>
              <Btn full onClick={soumettre} disabled={uploading}>{uploading?"⏳ Envoi en cours...":"✅ Valider le contrôle EPI"}</Btn>
            </div>
          )}

          {/* Skip si on veut revenir au badge (non bloquant) */}
          {onSkip&&<div style={{textAlign:"center",marginTop:16}}><button onClick={onSkip} style={{background:"none",border:"none",color:"#444",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Passer (contrôle non obligatoire)</button></div>}
        </div>
      </div>
    </div>
  );
}

function BadgePage({chantier,salaries,epiConfig}){

  const[salarie,setSalarie]=useState(null);

  const[result,setResult]=useState(null);
  const[showEpi,setShowEpi]=useState(false);
  const[epiData,setEpiData]=useState(null);

  useEffect(()=>{
    const sc=loadLocal("vonerlec:code");
    if(sc){
      const s=salaries.find(x=>x.code===sc);
      if(s){setSavedCode(sc);setSalarie(s);setCode(sc)}
    }
    if(chantier){
      const etat=etatJourDevice(chantier.id);
      setEtatJour(etat);
      if(etat==="entree")setType("sortie");else setType("entree");
    }
    // Charger EPI data
    fbGet("epi").then(raw=>{if(raw)setEpiData(Object.values(raw))});
  },[]);

  function validerCode(){
    const c=code.trim().toUpperCase();
    const s=salaries.find(x=>x.code===c);
    if(!s){setError("❌ Code inconnu. Vérifiez votre code ou contactez votre responsable.");return}
    if(!s.actif){setError("⛔ Ce compte est désactivé.");return}
    setSalarie(s);setSavedCode(c);saveLocal("vonerlec:code",c);setError("");
  }

  function checkEpiRequired(){
    if(!epiConfig||!epiConfig.actif||!salarie)return false;
    const records=(epiData||[]).filter(e=>e.code===salarie.code).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    const lastDate=records[0]?.timestamp;
    return epiRequis(lastDate,epiConfig.frequence);
  }

  async function pointer(){
    if(!salarie){setError("Entrez votre code");return}
    if(deviceDejaPointe(chantier.id,type)){setError(`⛔ Ce téléphone a déjà pointé ${type==="entree"?"l'arrivée":"le départ"} aujourd'hui.`);return}
    // Check EPI si arrivée
    if(type==="entree"&&checkEpiRequired()){
      if(epiConfig.bloquer){setShowEpi(true);return}
    }
    setStatus("checking");setError("");setGpsInfo("Recherche GPS...");
    try{
      const pos=await getAccuratePosition(12000);
      setGpsInfo(`Précision : ${Math.round(pos.coords.accuracy)}m`);
      const dist=haversineDistance(pos.coords.latitude,pos.coords.longitude,chantier.lat,chantier.lon);
      if(dist>chantier.rayon){setStatus("form");setError(`⛔ Vous êtes à ${Math.round(dist)}m du chantier (zone : ${chantier.rayon}m). Précision GPS : ${Math.round(pos.coords.accuracy)}m`);return}
      const p={id:Date.now(),chantierId:chantier.id,chantierNom:chantier.nom,code:salarie.code,nom:salarie.nom,prenom:salarie.prenom,type,timestamp:new Date().toISOString(),distance:Math.round(dist),accuracy:Math.round(pos.coords.accuracy)};
      enregistrerDevice(chantier.id,salarie.code,type);
      fbPush("pointages",p);
      setResult(p);setStatus("success");
      setEtatJour(type==="entree"?"entree":"les_deux");
      // Proposer EPI après badge si requis et non bloquant
      if(type==="entree"&&checkEpiRequired()&&!epiConfig.bloquer){setTimeout(()=>setShowEpi(true),1500)}
    }catch(err){
      setStatus("form");
      if(err?.code===1)setError("⛔ GPS refusé. Autorisez la localisation.\n\nAndroid : Paramètres → Chrome → Autorisations → Localisation\niOS : Réglages → Safari → Localisation");
      else setError("GPS indisponible. Vérifiez que le GPS est activé et réessayez.");
    }
  }

  if(showEpi&&salarie) return <EpiCapturePage salarie={salarie} chantierId={chantier.id} chantierNom={chantier.nom} onComplete={()=>{setShowEpi(false);fbGet("epi").then(raw=>{if(raw)setEpiData(Object.values(raw))});if(epiConfig.bloquer&&status!=="success")pointer()}} onSkip={epiConfig.bloquer?null:()=>setShowEpi(false)}/>;

  if(!chantier)return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div style={{textAlign:"center",background:"#12131E",borderRadius:18,padding:32,border:"1px solid #fc5c6533",maxWidth:360}}><div style={{fontSize:60,marginBottom:12}}>❌</div><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#fc5c65",marginBottom:12}}>QR Code invalide</div><div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Ce QR a été désactivé.<br/><strong style={{color:"#aaa"}}>Demandez le nouveau QR à votre responsable.</strong></div></div></div>);

  if(etatJour==="les_deux")return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div style={{textAlign:"center",background:"#12131E",borderRadius:18,padding:32,border:"1px solid #26de8133",maxWidth:360}}><div style={{fontSize:60,marginBottom:12}}>✅</div><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#26de81",marginBottom:8}}>Journée complète !</div><div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Arrivée et départ pointés sur <strong style={{color:"#FF5A1F"}}>{chantier.nom}</strong>.<br/>À demain ! 👋</div></div></div>);

  const isEntree=type==="entree";
  const couleurType=isEntree?"#26de81":"#45aaf2";

  return(
    <div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      {status==="success"?(
        <div className="pop" style={{textAlign:"center",maxWidth:400,width:"100%",background:"#12131E",borderRadius:18,padding:30,border:`1px solid ${couleurType}33`}}>
          <div style={{fontSize:80,marginBottom:8}}>{isEntree?"✅":"👋"}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:couleurType,letterSpacing:2}}>{isEntree?"ARRIVÉE OK !":"DÉPART OK !"}</div>
          <div style={{color:"#aaa",marginTop:8,fontSize:15}}>Bonne {isEntree?"journée":"fin de journée"} <strong style={{color:"#fff"}}>{salarie.prenom}</strong> !</div>
          <div style={{marginTop:18,background:"#0B0C14",borderRadius:12,padding:"14px 18px",border:"1px solid #1C1F35",textAlign:"left"}}>
            {[["Chantier",chantier.nom,null],["Type",isEntree?"🟢 Arrivée":"🔵 Départ",couleurType],["Heure",fmt(result.timestamp),"#f0f0f0"],["GPS",`✓ ${result.distance}m (±${result.accuracy}m)`,"#26de81"]].map(([l,v,c])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:14}}><span style={{color:"#666"}}>{l}</span><span style={{fontWeight:700,color:c||"#f0f0f0"}}>{v}</span></div>))}
          </div>
        </div>
      ):(
        <div style={{width:"100%",maxWidth:420}}>
          <div style={{background:`linear-gradient(135deg,${chantier.couleur},${chantier.couleur}cc)`,padding:"20px 22px",borderRadius:"16px 16px 0 0"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,opacity:.75,color:"#fff"}}>VONERLEC — POINTAGE</div>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:28,fontWeight:800,color:"#fff",lineHeight:1.1,marginTop:4}}>{chantier.nom}</div>
            {chantier.adresse&&<div style={{fontSize:12,opacity:.7,color:"#fff",marginTop:4}}>📍 {chantier.adresse}</div>}
          </div>
          <div style={{background:"#12131E",borderRadius:"0 0 16px 16px",padding:22,border:"1px solid #252840",borderTop:"none"}}>
            {/* TYPE */}
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {[["entree","🟢 ARRIVÉE","#26de81"],["sortie","🔵 DÉPART","#45aaf2"]].map(([t,label,color])=>{
                const deja=etatJour==="entree"&&t==="entree";
                return(<button key={t} onClick={()=>{if(!deja){setType(t);setError("")}}} style={{flex:1,padding:"14px 8px",borderRadius:10,border:`2px solid ${type===t&&!deja?color:"#252840"}`,background:deja?"#0a0a0a":type===t?color+"18":"#0B0C14",color:deja?"#333":type===t?color:"#555",fontWeight:700,fontSize:14,cursor:deja?"not-allowed":"pointer",letterSpacing:1}}>{label}{deja&&<div style={{fontSize:10,marginTop:3,color:"#444"}}>✓ déjà pointée</div>}</button>);
              })}
            </div>

            {/* CODE SALARIÉ */}
            {salarie?(
              <div style={{background:"#1a1030",borderRadius:10,padding:"12px 15px",marginBottom:16,border:"1px solid #7C5CBF33",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:42,height:42,borderRadius:12,background:"#FF5A1F22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#FF5A1F",fontFamily:"'Barlow Condensed'",letterSpacing:1,flexShrink:0}}>{salarie.code}</div>
                <div><div style={{color:"#888",fontSize:12}}>Bonjour !</div><div style={{fontWeight:700,fontSize:16}}>{salarie.prenom} {salarie.nom}</div></div>
                <button onClick={()=>{setSalarie(null);setSavedCode(null);setCode("");saveLocal("vonerlec:code",null)}} style={{marginLeft:"auto",background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Changer</button>
              </div>
            ):(
              <div style={{marginBottom:16}}>
                <label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>VOTRE CODE (ex: JM01)</label>
                <div style={{display:"flex",gap:8}}>
                  <input value={code} onChange={e=>setCode(e.target.value.toUpperCase().slice(0,6))} placeholder="JM01" onKeyDown={e=>e.key==="Enter"&&validerCode()} style={{letterSpacing:4,fontWeight:700,fontSize:18,textAlign:"center",fontFamily:"'Barlow Condensed'"}}/>
                  <button onClick={validerCode} style={{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",border:"none",borderRadius:10,color:"#fff",padding:"0 20px",fontWeight:700,cursor:"pointer",flexShrink:0,fontSize:14}}>OK</button>
                </div>
                <div style={{color:"#444",fontSize:12,marginTop:6}}>💡 Code donné par votre responsable</div>
              </div>
            )}

            {/* EPI warning */}
            {salarie&&type==="entree"&&checkEpiRequired()&&(
              <div style={{background:"#2a2010",borderRadius:10,padding:"10px 14px",border:"1px solid #F7B73133",marginBottom:14,fontSize:12,color:"#F7B731",lineHeight:1.7}}>
                🛡️ <strong>Contrôle EPI requis</strong> {epiConfig?.bloquer?"— Badge bloqué tant que les photos ne sont pas prises":"— Il vous sera demandé après le pointage"}
              </div>
            )}

            <div style={{background:"#0B0C14",borderRadius:10,padding:"10px 14px",border:"1px solid #1C1F35",marginBottom:14,fontSize:12,color:"#555",lineHeight:1.8}}>
              🛡️ <span style={{color:"#FF5A1F",fontWeight:700}}>Sécurité :</span> GPS vérifié dans {chantier.rayon}m · 1 arrivée + 1 départ max/jour
            </div>
            {gpsInfo&&status==="checking"&&<div style={{color:"#45aaf2",fontSize:12,marginBottom:10,animation:"pulse 1s infinite"}}>📡 {gpsInfo}</div>}
            {error&&<div style={{background:"#2a1515",borderRadius:10,padding:"11px 14px",border:"1px solid #fc5c6533",color:"#fc5c65",fontSize:13,marginBottom:14,lineHeight:1.6,whiteSpace:"pre-line"}}>{error}</div>}
            <button onClick={salarie?pointer:validerCode} disabled={status==="checking"||(!salarie&&!code.trim())} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:status==="checking"?"#2a2a2a":`linear-gradient(135deg,${couleurType},${couleurType}cc)`,color:status==="checking"?"#fff":isEntree?"#0B0C14":"#fff",fontWeight:800,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:status==="checking"?"not-allowed":"pointer",letterSpacing:1,boxShadow:status==="checking"?"none":`0 4px 20px ${couleurType}44`}}>
              {status==="checking"?<><span style={{width:17,height:17,borderRadius:"50%",border:"2px solid #fff3",borderTopColor:isEntree?"#0B0C14":"#fff",display:"inline-block",animation:"spin .7s linear infinite"}}/>Vérification GPS...</>:salarie?(isEntree?"🟢 POINTER MON ARRIVÉE":"🔵 POINTER MON DÉPART"):"VALIDER MON CODE"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function QRModal({chantier,onClose,onChangeQR}){
  const[confirming,setConfirming]=useState(false);
  const v=chantier.qrVersion||1;const link=`${window.location.href.split("#")[0]}#badge/${encodeQRData(chantier)}`;
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(link)}&margin=14&color=0D0E16&bgcolor=ffffff`;
  const ca=chantier.qrChangedAt?new Date(chantier.qrChangedAt).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
  return(<Modal onClose={onClose} width={440}><div style={{textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:6}}>{chantier.nom}</div><Tag color="#26de81">QR actif · v{v}</Tag><div style={{background:"#fff",borderRadius:14,padding:22,margin:"18px auto",display:"inline-block",border:`4px solid ${chantier.couleur}`,lineHeight:0}}><img src={qrUrl} alt="QR" width={230} height={230} style={{borderRadius:6,display:"block"}}/></div><div style={{background:"#0B0C14",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,textAlign:"left"}}>{[["Statut","🟢 Actif","#26de81"],["Rayon",`${chantier.rayon}m`,null],["Changé le",ca,"#F7B731"]].map(([l,val,c])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:"#666"}}>{l}</span><span style={{color:c||"#f0f0f0",fontWeight:c?700:400}}>{val}</span></div>))}</div>{!confirming?(<div style={{background:"#1a1010",borderRadius:10,padding:"12px 16px",marginBottom:16,border:"1px solid #fc5c6522",textAlign:"left"}}><div style={{color:"#fc5c65",fontWeight:700,fontSize:13,marginBottom:8}}>🔄 Changer le QR</div><Btn full onClick={()=>setConfirming(true)} variant="danger" small>Générer un nouveau QR</Btn></div>):(<div style={{background:"#2a1010",borderRadius:10,padding:"14px 16px",marginBottom:16,border:"1px solid #fc5c65",textAlign:"left"}}><div style={{color:"#fc5c65",fontWeight:700,marginBottom:10}}>⚠️ L'ancien QR sera invalide immédiatement</div><div style={{display:"flex",gap:10}}><Btn full onClick={()=>{onChangeQR(chantier.id);setConfirming(false)}} variant="danger">Confirmer</Btn><Btn full onClick={()=>setConfirming(false)} variant="ghost">Annuler</Btn></div></div>)}<Btn full onClick={()=>window.print()} variant="secondary" style={{marginBottom:8}}>🖨️ Imprimer</Btn><Btn full onClick={onClose} variant="ghost">Fermer</Btn></div></Modal>);
}

function ChantierForm({initial,onSave,onClose}){
  const[form,setForm]=useState(initial||{nom:"",adresse:"",lat:"",lon:"",rayon:200,couleur:"#FF5A1F"});
  const[searchAdresse,setSearchAdresse]=useState(initial?.adresse||"");
  const[suggestions,setSuggestions]=useState([]);
  const[searchStatus,setSearchStatus]=useState(initial?.lat?"selected":"");
  const[gpsStatus,setGpsStatus]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function rechercher(){
    if(!searchAdresse.trim())return;setSearchStatus("loading");setSuggestions([]);
    try{const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(searchAdresse+" France")}&limit=5&lang=fr`);const data=await res.json();
      const results=(data.features||[]).map(f=>{const p=f.properties;const parts=[];if(p.housenumber&&p.street)parts.push(p.housenumber+" "+p.street);else if(p.street)parts.push(p.street);else if(p.name)parts.push(p.name);if(p.postcode)parts.push(p.postcode);if(p.city)parts.push(p.city);return{label:parts.join(", ")||p.name||"Adresse",lat:f.geometry.coordinates[1].toFixed(6),lon:f.geometry.coordinates[0].toFixed(6)}});
      if(results.length===1)choisir(results[0]);else if(results.length>1){setSuggestions(results);setSearchStatus("ok")}else setSearchStatus("error");
    }catch{setSearchStatus("error")}
  }
  function choisir(s){set("adresse",s.label);set("lat",s.lat);set("lon",s.lon);setSearchAdresse(s.label);setSuggestions([]);setSearchStatus("selected")}
  function useGPS(){if(!navigator.geolocation)return;setGpsStatus("loading");navigator.geolocation.getCurrentPosition(p=>{set("lat",p.coords.latitude.toFixed(6));set("lon",p.coords.longitude.toFixed(6));setGpsStatus("ok")},()=>setGpsStatus("error"),{enableHighAccuracy:true,timeout:10000})}
  const ok=form.lat&&form.lon;
  return(<Modal onClose={onClose}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>{initial?.id?"✏️ Modifier":"➕ Nouveau chantier"}</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM *</label><input value={form.nom} onChange={e=>set("nom",e.target.value)} placeholder="Résidence Les Pins"/></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>🔍 ADRESSE</label><div style={{display:"flex",gap:8}}><input value={searchAdresse} onChange={e=>{setSearchAdresse(e.target.value);setSuggestions([]);setSearchStatus("")}} onKeyDown={e=>e.key==="Enter"&&rechercher()} placeholder="12 Rue de la Paix, Lyon" style={{flex:1}}/><button onClick={rechercher} disabled={searchStatus==="loading"} style={{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",border:"none",borderRadius:10,color:"#fff",padding:"0 16px",fontWeight:700,cursor:"pointer",flexShrink:0}}>{searchStatus==="loading"?"⏳":"🔍"}</button></div>
      {searchStatus==="selected"&&<div style={{marginTop:6,background:"#0f2a1f",borderRadius:8,padding:"10px 14px",border:"1px solid #26de8133",fontSize:13,color:"#26de81"}}>✅ {form.adresse}</div>}
      {suggestions.length>0&&<div style={{marginTop:6,background:"#151724",borderRadius:8,border:"2px solid #FF5A1F",overflow:"hidden"}}>{suggestions.map((s,i)=><div key={i} onClick={()=>choisir(s)} style={{padding:"12px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid #252840":"none",fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#FF5A1F18"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>📍 {s.label}</div>)}</div>}
    </div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>📍 GPS</label><button onClick={useGPS} style={{width:"100%",background:"#151724",border:`1.5px solid ${gpsStatus==="ok"?"#26de81":"#252840"}`,borderRadius:10,color:gpsStatus==="ok"?"#26de81":"#aaa",padding:"11px 14px",fontSize:13,cursor:"pointer"}}>{gpsStatus==="loading"?"⏳ Récupération...":gpsStatus==="ok"?"✅ Position GPS OK":"📍 Utiliser ma position"}</button></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>LAT / LON</label><div style={{display:"flex",gap:10}}><input value={form.lat} onChange={e=>{set("lat",e.target.value);if(e.target.value)setSearchStatus("selected")}} placeholder="48.6291"/><input value={form.lon} onChange={e=>{set("lon",e.target.value)}} placeholder="2.4407"/></div></div>
    {ok&&<div style={{background:"#0f2a1f",borderRadius:8,padding:"8px 14px",border:"1px solid #26de8133",fontSize:13,color:"#26de81"}}>🎯 Position : {parseFloat(form.lat).toFixed(4)}, {parseFloat(form.lon).toFixed(4)}</div>}
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>RAYON (m)</label><input type="number" value={form.rayon} onChange={e=>set("rayon",e.target.value)} min={50} max={1000}/></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:8}}>COULEUR</label><div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{COULEURS.map(c=><div key={c} onClick={()=>set("couleur",c)} style={{width:34,height:34,borderRadius:10,background:c,cursor:"pointer",border:form.couleur===c?"3px solid #fff":"3px solid transparent",transform:form.couleur===c?"scale(1.15)":"scale(1)",transition:"all .15s"}}/>)}</div></div>
  </div><div style={{display:"flex",gap:10,marginTop:22}}><Btn full onClick={()=>{if(!form.nom)return alert("Nom requis");if(!form.lat||!form.lon)return alert("Position GPS requise");onSave({...form,id:initial?.id,lat:parseFloat(form.lat),lon:parseFloat(form.lon),rayon:parseInt(form.rayon)||200})}}>{initial?.id?"💾 Enregistrer":"✅ Créer"}</Btn><Btn full onClick={onClose} variant="ghost">Annuler</Btn></div></Modal>);
}

function SalarieForm({initial,salaries,onSave,onClose}){
  const[form,setForm]=useState(initial||{code:"",nom:"",prenom:"",actif:true});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  // Auto-generate code
  function autoCode(){
    if(form.prenom&&form.nom){
      const base=(form.prenom[0]+form.nom[0]).toUpperCase();
      let n=1;while(salaries.some(s=>s.code===base+String(n).padStart(2,"0")&&(!initial||s.code!==initial.code)))n++;
      set("code",base+String(n).padStart(2,"0"));
    }
  }
  useEffect(()=>{if(!initial&&form.prenom&&form.nom)autoCode()},[form.prenom,form.nom]);
  return(<Modal onClose={onClose} width={420}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>{initial?"✏️ Modifier":"➕ Nouveau salarié"}</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>PRÉNOM</label><input value={form.prenom} onChange={e=>set("prenom",e.target.value)} placeholder="Jamil"/></div><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM</label><input value={form.nom} onChange={e=>set("nom",e.target.value.toUpperCase())} placeholder="MOHAMMAD"/></div></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>CODE UNIQUE</label><div style={{display:"flex",gap:8}}><input value={form.code} onChange={e=>set("code",e.target.value.toUpperCase().slice(0,6))} placeholder="JM01" style={{letterSpacing:4,fontWeight:700,fontSize:18,textAlign:"center",fontFamily:"'Barlow Condensed'"}}/><Btn small onClick={autoCode} variant="secondary">Auto</Btn></div></div>
    <div style={{display:"flex",alignItems:"center",gap:10}}><label style={{color:"#666",fontSize:12}}>Actif</label><button onClick={()=>set("actif",!form.actif)} style={{width:44,height:24,borderRadius:12,background:form.actif?"#26de81":"#252840",border:"none",position:"relative",cursor:"pointer",transition:"all .2s"}}><div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:2,left:form.actif?22:2,transition:"left .2s"}}/></button><span style={{color:form.actif?"#26de81":"#666",fontSize:12}}>{form.actif?"Oui":"Non"}</span></div>

function SaisieManuelleModal({chantiers,salaries,onSave,onClose}){
  const[form,setForm]=useState({code:salaries[0]?.code||"",chantierId:chantiers[0]?.id||"",type:"entree",date:new Date().toISOString().slice(0,10),heure:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  function valider(){
    const sal=salaries.find(s=>s.code===form.code);if(!sal)return alert("Code salarié invalide");
    const ch=chantiers.find(c=>c.id==form.chantierId);const[h,m]=form.heure.split(":");
    const ts=new Date(`${form.date}T${h.padStart(2,"0")}:${m.padStart(2,"0")}:00`).toISOString();
    onSave({id:Date.now(),chantierId:ch.id,chantierNom:ch.nom,code:sal.code,nom:sal.nom,prenom:sal.prenom,type:form.type,timestamp:ts,distance:0,manuel:true});
  }
  return(<Modal onClose={onClose} width={440}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>✏️ Saisie manuelle</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>SALARIÉ</label><select value={form.code} onChange={e=>set("code",e.target.value)}>{salaries.filter(s=>s.actif).map(s=><option key={s.code} value={s.code}>{s.code} — {s.prenom} {s.nom}</option>)}</select></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>CHANTIER</label><select value={form.chantierId} onChange={e=>set("chantierId",e.target.value)}>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select></div>
    <div style={{display:"flex",gap:10}}>{[["entree","🟢 Arrivée"],["sortie","🔵 Départ"]].map(([t,l])=>(<button key={t} onClick={()=>set("type",t)} style={{flex:1,padding:11,borderRadius:8,border:`2px solid ${form.type===t?"#FF5A1F":"#252840"}`,background:form.type===t?"#FF5A1F18":"#0B0C14",color:form.type===t?"#FF5A1F":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>{l}</button>))}</div>
    <div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>DATE</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>HEURE</label><input type="time" value={form.heure} onChange={e=>set("heure",e.target.value)}/></div></div>
    <div style={{background:"#1a1010",borderRadius:8,padding:"10px 14px",border:"1px solid #F7B73133",fontSize:12,color:"#F7B731"}}>⚠️ Marqué "Manuel" dans l'historique</div>
  </div><div style={{display:"flex",gap:10,marginTop:20}}><Btn full onClick={valider}>✅ Enregistrer</Btn><Btn full onClick={onClose} variant="ghost">Annuler</Btn></div></Modal>);
}

// ─── ADMIN APP ───────────────────────────────────────────────────────────────
function AdminApp({chantiers,pointages,salaries,epiRecords,epiConfig,onSaveChantier,onDeleteChantier,onDeletePointage,onChangeQR,onLogout,onRefresh,onAddManuel,onClearAll,onClearToday,onPurgeSalarie,onSaveSalarie,onDeleteSalarie,onSaveEpiConfig}){
  const[tab,setTab]=useState("dashboard");
  const[showQR,setShowQR]=useState(null);const[showAdd,setShowAdd]=useState(false);const[editItem,setEditItem]=useState(null);
  const[showManuel,setShowManuel]=useState(false);const[showAddSal,setShowAddSal]=useState(false);const[editSal,setEditSal]=useState(null);
  const[toast,setToast]=useState(null);const[prevCount,setPrevCount]=useState(pointages.length);
  const[refreshing,setRefreshing]=useState(false);const[lastRefresh,setLastRefresh]=useState(new Date());
  const[filterChantier,setFilterChantier]=useState("all");const[filterDate,setFilterDate]=useState("");
  const[epiViewCode,setEpiViewCode]=useState(null);

  const today=new Date().toDateString();
  const todayP=pointages.filter(p=>new Date(p.timestamp).toDateString()===today);

  const todayGrouped=useMemo(()=>{
    const map={};
    todayP.forEach(p=>{const k=p.code+"__"+p.chantierId;if(!map[k])map[k]={code:p.code,nom:p.nom,prenom:p.prenom,chantierId:p.chantierId,chantierNom:p.chantierNom,entree:null,sortie:null};if(p.type!=="sortie"&&!map[k].entree)map[k].entree=p;if(p.type==="sortie"&&!map[k].sortie)map[k].sortie=p});
    return Object.values(map).sort((a,b)=>{const tA=a.sortie?.timestamp||a.entree?.timestamp;const tB=b.sortie?.timestamp||b.entree?.timestamp;return new Date(tB)-new Date(tA)});
  },[todayP]);

  const nbPresents=todayGrouped.filter(g=>g.entree&&!g.sortie).length;
  const nbPartis=todayGrouped.filter(g=>g.entree&&g.sortie).length;

  useEffect(()=>{const t=setInterval(()=>{onRefresh();setLastRefresh(new Date())},15000);return()=>clearInterval(t)},[]);
  useEffect(()=>{if(pointages.length>prevCount&&prevCount>0){const n=pointages[0];setToast({msg:`${n.prenom} ${n.nom} ${n.type==="sortie"?"est parti":"vient d'arriver"} !`,sub:`${n.chantierNom} · ${fmt(n.timestamp)}`})}setPrevCount(pointages.length)},[pointages.length]);
  useEffect(()=>{if(showQR){const u=chantiers.find(c=>c.id===showQR.id);if(u)setShowQR(u)}},[chantiers]);

  const filteredP=useMemo(()=>{let l=pointages;if(filterChantier!=="all")l=l.filter(p=>p.chantierId==filterChantier);if(filterDate)l=l.filter(p=>new Date(p.timestamp).toISOString().slice(0,10)===filterDate);return l},[pointages,filterChantier,filterDate]);

    <div style={{minHeight:"100vh",background:"#0B0C14"}}>

      {toast&&<Toast msg={toast.msg} sub={toast.sub} onClose={()=>setToast(null)}/>}

      {/* HEADER */}
      <div style={{background:"#0f1019",borderBottom:"1px solid #1C1F35",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:24}}>🏗️</span><div><div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,color:"#FF5A1F",lineHeight:1}}>VONERLEC</div><div style={{fontSize:9,color:"#444",letterSpacing:1.5,fontWeight:600}}>GESTION DE CHANTIER</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>{setRefreshing(true);onRefresh();setLastRefresh(new Date());setTimeout(()=>setRefreshing(false),600)}} style={{background:"#1C1F35",border:"1px solid #252840",borderRadius:10,color:"#888",padding:"7px 12px",fontSize:12,cursor:"pointer"}}><span style={{display:"inline-block",animation:refreshing?"spin .7s linear infinite":"none"}}>🔄</span></button><Btn small onClick={onLogout} variant="ghost">Déco.</Btn></div>
      </div>

      {/* TABS */}
      <div style={{background:"#0f1019",borderBottom:"1px solid #1C1F35",padding:"0 12px",display:"flex",gap:2,overflowX:"auto"}}>
        {tabs.map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{background:tab===id?"#FF5A1F18":"none",border:"none",color:tab===id?"#FF5A1F":"#555",padding:"11px 14px",fontSize:12,fontWeight:600,cursor:"pointer",borderBottom:tab===id?"2px solid #FF5A1F":"2px solid transparent",borderRadius:"8px 8px 0 0",whiteSpace:"nowrap"}}>{label}</button>))}
      </div>

      <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>

        {/* ── DASHBOARD ── */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:18,flexWrap:"wrap",gap:8}}>

            <div style={{display:"flex",gap:8}}><Btn small onClick={()=>exporterExcel(pointages,chantiers,salaries)} variant="secondary">📊 Excel</Btn><Btn small onClick={()=>setShowManuel(true)} variant="secondary">✏️ Manuel</Btn></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:20}}>
            {[{l:"Chantiers",v:chantiers.length,i:"🏗️",c:"#FF5A1F"},{l:"Salariés",v:salaries.filter(s=>s.actif).length,i:"👷",c:"#7C5CBF"},{l:"Sur site",v:nbPresents,i:"🟢",c:"#26de81"},{l:"Partis",v:nbPartis,i:"🔵",c:"#45aaf2"},{l:"Pointages",v:todayP.length,i:"📋",c:"#F7B731"}].map((s,i)=>(

            ))}
          </div>
          <div className="card" style={{padding:18}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:17,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>Activité du jour {todayGrouped.length>0&&<Tag color="#FF5A1F">{todayGrouped.length} salarié{todayGrouped.length>1?"s":""}</Tag>}</div>
            {todayGrouped.length===0?<div style={{color:"#444",textAlign:"center",padding:"24px 0",fontSize:13}}>Aucun pointage aujourd'hui</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {todayGrouped.map((g,i)=>{const ch=chantiers.find(c=>c.id===g.chantierId);const pres=g.entree&&!g.sortie;let duree="";if(g.entree&&g.sortie){const d=new Date(g.sortie.timestamp)-new Date(g.entree.timestamp);if(d>0){const h=Math.floor(d/3600000);const m=Math.floor((d%3600000)/60000);duree=`${h}h${m.toString().padStart(2,"0")}`}}
                  return(<div key={i} style={{display:"flex",alignItems:"center",background:"#0B0C14",borderRadius:12,padding:"10px 14px",border:`1px solid ${pres?"#26de8118":"#1C1F35"}`,gap:12,flexWrap:"wrap"}}>
                    <div style={{width:40,height:40,borderRadius:10,background:"#FF5A1F22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#FF5A1F",fontFamily:"'Barlow Condensed'",flexShrink:0}}>{g.code}</div>
                    <div style={{flex:1,minWidth:100}}><div style={{fontWeight:700,fontSize:14}}>{g.prenom} {g.nom}</div><div style={{color:"#555",fontSize:12}}>{g.chantierNom}</div></div>
                    <div style={{textAlign:"center",minWidth:55}}><div style={{fontSize:10,color:"#26de81",fontWeight:600}}>ARRIVÉE</div><div style={{fontWeight:700,fontSize:14,color:g.entree?"#f0f0f0":"#333"}}>{g.entree?fmt(g.entree.timestamp):"—"}</div></div>
                    <div style={{textAlign:"center",minWidth:55}}><div style={{fontSize:10,color:"#45aaf2",fontWeight:600}}>DÉPART</div><div style={{fontWeight:700,fontSize:14,color:g.sortie?"#f0f0f0":"#333"}}>{g.sortie?fmt(g.sortie.timestamp):"—"}</div></div>
                    <div style={{textAlign:"center",minWidth:45}}><div style={{fontSize:10,color:"#F7B731",fontWeight:600}}>DURÉE</div><div style={{fontWeight:700,fontSize:13,color:duree?"#F7B731":"#333"}}>{duree||"..."}</div></div>
                    <Tag color={pres?"#26de81":"#45aaf2"}>{pres?"Sur site":"Parti"}</Tag>
                  </div>)})}
              </div>}
          </div>
        </div>)}

        {/* ── CHANTIERS ── */}
        {tab==="chantiers"&&(<div className="anim">

          {chantiers.length===0&&<div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#555"}}>Aucun chantier</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
            {chantiers.map(ch=>{const ver=ch.qrVersion||1;const pres=todayGrouped.filter(g=>g.chantierId===ch.id&&g.entree&&!g.sortie);return(
              <div key={ch.id} className="card" style={{overflow:"hidden"}}><div style={{background:`linear-gradient(135deg,${ch.couleur},${ch.couleur}aa)`,padding:"14px 18px"}}><div style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:800,color:"#fff"}}>{ch.nom}</div><div style={{fontSize:12,color:"#ffffff77",marginTop:2}}>📍 {ch.adresse||"—"}</div></div>
                <div style={{padding:"14px 16px"}}><div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}><Tag color={ch.couleur}>📡 {ch.rayon}m</Tag><Tag color="#26de81">🟢 {pres.length} présent{pres.length>1?"s":""}</Tag><Tag color="#F7B731">QR v{ver}</Tag></div>
                  <div style={{display:"flex",gap:8}}><Btn small full onClick={()=>setShowQR(ch)}>📱 QR</Btn><Btn small onClick={()=>setEditItem(ch)} variant="ghost">✏️</Btn><Btn small onClick={()=>{if(confirm("Supprimer ?"))onDeleteChantier(ch.id)}} variant="danger">🗑️</Btn></div>
                </div></div>)})}

          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
            {salaries.map(s=>{
              const lastEpi=(epiRecords||[]).filter(e=>e.code===s.code).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
              const jours=joursDepuisEpi(lastEpi?.timestamp);
              const epiOk=!epiConfig?.actif||!epiRequis(lastEpi?.timestamp,epiConfig.frequence);
              return(<div key={s.code} className="card" style={{padding:"16px 18px",opacity:s.actif?1:.5}}>

                <div style={{display:"flex",gap:8}}><Btn small full onClick={()=>setEditSal(s)} variant="secondary">✏️ Modifier</Btn><Btn small onClick={()=>{if(confirm(`Supprimer ${s.prenom} ${s.nom} ?`))onDeleteSalarie(s.code)}} variant="danger">🗑️</Btn></div>
              </div>)})}

              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{color:"#666",fontSize:12}}>Activer</label>

              </div>
              <Btn small variant="ghost" onClick={()=>setEpiViewCode(null)} style={{marginTop:12}}>Fermer</Btn>
            </div>);
          })()}
        </div>)}

        {/* ── HISTORIQUE ── */}
        {tab==="pointages"&&(<div className="anim">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>Historique</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><Btn small onClick={()=>exporterExcel(pointages,chantiers,salaries)} variant="secondary">📊 Excel</Btn><Btn small onClick={()=>setShowManuel(true)} variant="secondary">✏️</Btn><Btn small onClick={()=>{if(confirm("Supprimer aujourd'hui ?"))onClearToday()}} variant="danger">🗑️ Aujourd'hui</Btn><Btn small onClick={()=>{if(confirm("⚠️ TOUT supprimer ?"))onClearAll()}} variant="danger">🗑️ Tout</Btn></div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <select value={filterChantier} onChange={e=>setFilterChantier(e.target.value)} style={{maxWidth:200}}><option value="all">Tous les chantiers</option>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>
            <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{maxWidth:170}}/>
            {filterDate&&<Btn small onClick={()=>setFilterDate("")} variant="ghost">✕</Btn>}
            <div style={{marginLeft:"auto"}}><Tag color="#FF5A1F">{filteredP.length}</Tag></div>
          </div>
          {filteredP.length===0?<div className="card" style={{padding:"50px 20px",textAlign:"center",color:"#555"}}>Aucun pointage</div>
          :<div className="card" style={{overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:550}}>
            <thead><tr style={{background:"#0B0C14"}}>{["Date","Heure","Type","Code","Salarié","Chantier","GPS",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",color:"#444",fontSize:10,fontWeight:700,letterSpacing:1,borderBottom:"1px solid #1C1F35"}}>{h}</th>)}</tr></thead>
            <tbody>{filteredP.map((p,i)=>{const isSortie=p.type==="sortie";return(
              <tr key={p.id} style={{borderBottom:"1px solid #16172022",background:i%2?"#0a0b12":"transparent"}}>
                <td style={{padding:"9px 12px",color:"#666",fontSize:12}}>{fmt(p.timestamp,"date")}</td>
                <td style={{padding:"9px 12px",fontWeight:700,fontSize:13}}>{fmt(p.timestamp)}</td>
                <td style={{padding:"9px 12px"}}><Tag color={isSortie?"#45aaf2":"#26de81"}>{isSortie?"Départ":"Arrivée"}</Tag></td>
                <td style={{padding:"9px 12px",fontWeight:700,color:"#FF5A1F",fontSize:13}}>{p.code||"—"}</td>
                <td style={{padding:"9px 12px",fontWeight:600,fontSize:13}}>{p.prenom} {p.nom}</td>
                <td style={{padding:"9px 12px",fontSize:12}}>{p.chantierNom}</td>
                <td style={{padding:"9px 12px"}}>{p.manuel?<Tag color="#F7B731">Manuel</Tag>:<Tag color={p.distance<100?"#26de81":"#F7B731"}>{p.distance}m{p.accuracy?` ±${p.accuracy}`:""}</Tag>}</td>
                <td style={{padding:"9px 12px"}}><Btn small onClick={()=>{if(confirm("Supprimer ?"))onDeletePointage(p.id)}} variant="danger">🗑️</Btn></td>
              </tr>)})}</tbody>
          </table></div>}
        </div>)}
      </div>

      {showQR&&<QRModal chantier={showQR} onClose={()=>setShowQR(null)} onChangeQR={id=>onChangeQR(id)}/>}
      {showAdd&&<ChantierForm initial={null} onSave={d=>{onSaveChantier(d);setShowAdd(false)}} onClose={()=>setShowAdd(false)}/>}
      {editItem&&<ChantierForm initial={editItem} onSave={d=>{onSaveChantier(d);setEditItem(null)}} onClose={()=>setEditItem(null)}/>}
      {showManuel&&<SaisieManuelleModal chantiers={chantiers} salaries={salaries} onSave={p=>{onAddManuel(p);setShowManuel(false)}} onClose={()=>setShowManuel(false)}/>}
      {showAddSal&&<SalarieForm initial={null} salaries={salaries} onSave={s=>{onSaveSalarie(s);setShowAddSal(false)}} onClose={()=>setShowAddSal(false)}/>}
      {editSal&&<SalarieForm initial={editSal} salaries={salaries} onSave={s=>{onSaveSalarie(s);setEditSal(false)}} onClose={()=>setEditSal(null)}/>}
    </div>
  );
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function AccesPage({onLogin}){
  const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  async function go(){setLoading(true);setErr("");await new Promise(r=>setTimeout(r,400));const h=await sha256(pw);if(h===_HASH){saveLocal("vonerlec:session","ok");onLogin()}else{setErr("Mot de passe incorrect");setLoading(false)}}
  return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div className="anim" style={{textAlign:"center",maxWidth:360,width:"100%"}}><div style={{fontSize:60,marginBottom:6}}>🏗️</div><div style={{fontFamily:"'Bebas Neue'",fontSize:48,color:"#FF5A1F",letterSpacing:4,lineHeight:1}}>VONERLEC</div><div style={{color:"#444",marginBottom:34,fontSize:12,letterSpacing:2,fontWeight:500}}>GESTION DE CHANTIER</div><div style={{background:"#12131E",borderRadius:16,padding:28,border:"1px solid #1C1F35"}}><label style={{color:"#555",fontSize:11,letterSpacing:1,display:"block",textAlign:"left",marginBottom:8,fontWeight:600}}>CODE D'ACCÈS</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" autoFocus style={{marginBottom:10,letterSpacing:4}}/>{err&&<div style={{color:"#fc5c65",fontSize:13,marginBottom:10,textAlign:"left"}}>⚠️ {err}</div>}<button onClick={go} disabled={loading||!pw} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:loading||!pw?"#1C1F35":"linear-gradient(135deg,#FF5A1F,#FF7A45)",color:loading||!pw?"#444":"#fff",fontWeight:700,fontSize:15,cursor:loading||!pw?"not-allowed":"pointer",marginTop:4}}>{loading?"...":"ACCÉDER →"}</button></div></div></div>);
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState("loading");
  const[chantiers,setChantiers]=useState([]);const[pointages,setPointages]=useState([]);
  const[salaries,setSalaries]=useState([]);const[epiRecords,setEpiRecords]=useState([]);
  const[epiConfig,setEpiConfig]=useState({actif:false,frequence:"semaine",bloquer:false});
  const[badgeChantier,setBadgeChantier]=useState(null);

  async function loadAll(){
    const[rawC,rawP,rawS,rawE,rawEC]=await Promise.all([fbGet("chantiers"),fbGet("pointages"),fbGet("salaries"),fbGet("epi"),fbGet("epiConfig")]);
    const c=rawC?Object.values(rawC):[];setChantiers(c);
    const p=rawP?Object.values(rawP).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)):[];setPointages(p);
    const s=rawS?Object.values(rawS):[];setSalaries(s);
    const e=rawE?Object.values(rawE):[];setEpiRecords(e);
    if(rawEC)setEpiConfig(rawEC);
    return{c,p,s,e};
  }

  useEffect(()=>{
    const fromQR=decodeQRData(window.location.hash);
    if(fromQR){setBadgeChantier(fromQR);loadAll().then(()=>setView("badge"));return}
    const session=loadLocal("vonerlec:session");
    if(session==="ok")loadAll().then(()=>setView("admin"));
    else loadAll().then(()=>setView("login"));
  },[]);

  const persistC=async l=>{setChantiers(l);await fbSet("chantiers",l.reduce((a,c)=>{a[c.id]=c;return a},{}))};
  const persistP=async l=>{setPointages(l);await fbSet("pointages",l.reduce((a,p,i)=>{a[p.id||i]=p;return a},{}))};
  const persistS=async l=>{setSalaries(l);await fbSet("salaries",l.reduce((a,s)=>{a[s.code]=s;return a},{}))};

  function handleSaveChantier(d){let l;if(d.id){l=chantiers.map(c=>c.id===d.id?{...d,qrVersion:c.qrVersion||1,qrChangedAt:c.qrChangedAt}:c)}else{const newId=chantiers.length>0?Math.max(...chantiers.map(x=>x.id||0))+1:100;l=[...chantiers,{...d,id:newId,qrVersion:1,qrChangedAt:new Date().toISOString()}]}persistC(l)}
  function handleSaveSalarie(s){const exists=salaries.find(x=>x.code===s.code);if(exists)persistS(salaries.map(x=>x.code===s.code?s:x));else persistS([...salaries,s])}
  function handleDeleteSalarie(code){persistS(salaries.filter(s=>s.code!==code))}
  async function handleSaveEpiConfig(cfg){setEpiConfig(cfg);await fbSet("epiConfig",cfg)}

  if(view==="loading")return <div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center"}}><style>{css}</style><div style={{fontFamily:"'Bebas Neue'",fontSize:28,color:"#FF5A1F",letterSpacing:4,animation:"pulse 1.5s infinite"}}>VONERLEC...</div></div>;
  if(view==="badge")return <BadgePage chantier={badgeChantier} salaries={salaries} epiConfig={epiConfig}/>;
  if(view==="login")return <AccesPage onLogin={()=>{loadAll();setView("admin")}}/>;

  return <AdminApp
    chantiers={chantiers} pointages={pointages} salaries={salaries} epiRecords={epiRecords} epiConfig={epiConfig}
    onSaveChantier={handleSaveChantier}
    onDeleteChantier={async id=>{await persistC(chantiers.filter(c=>c.id!==id))}}
    onDeletePointage={async id=>{await persistP(pointages.filter(p=>p.id!==id))}}
    onChangeQR={id=>persistC(chantiers.map(c=>c.id===id?{...c,qrVersion:(c.qrVersion||1)+1,qrChangedAt:new Date().toISOString()}:c))}
    onLogout={()=>{saveLocal("vonerlec:session",null);setView("login")}}
    onRefresh={loadAll}
    onAddManuel={async p=>{const u=[p,...pointages].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));await persistP(u)}}
    onClearAll={async()=>{await fbDelete("pointages");setPointages([])}}
    onClearToday={async()=>{const t=new Date().toDateString();await persistP(pointages.filter(p=>new Date(p.timestamp).toDateString()!==t))}}
    onPurgeSalarie={async(cId,code)=>{const t=new Date().toDateString();await persistP(pointages.filter(p=>!(new Date(p.timestamp).toDateString()===t&&p.chantierId===cId&&p.code===code)))}}
    onSaveSalarie={handleSaveSalarie}
    onDeleteSalarie={handleDeleteSalarie}
    onSaveEpiConfig={handleSaveEpiConfig}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
