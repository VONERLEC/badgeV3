                </div>

              </div>)})}
          </div>}
        </div>)}

        {/* ── EPI ── */}
        {tab==="epi"&&(<div className="anim">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>🛡️ Contrôle EPI</div>
          </div>

          {/* Config */}
          <div className="card" style={{padding:18,marginBottom:20}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:17,fontWeight:700,marginBottom:14}}>⚙️ Configuration</div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{color:"#666",fontSize:12}}>Activer</label>
                <button onClick={()=>onSaveEpiConfig({...epiConfig,actif:!epiConfig?.actif})} style={{width:44,height:24,borderRadius:12,background:epiConfig?.actif?"#26de81":"#252840",border:"none",position:"relative",cursor:"pointer"}}><div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:2,left:epiConfig?.actif?22:2,transition:"left .2s"}}/></button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{color:"#666",fontSize:12}}>Fréquence</label>
                <select value={epiConfig?.frequence||"semaine"} onChange={e=>onSaveEpiConfig({...epiConfig,frequence:e.target.value})} style={{maxWidth:140}}>
                  <option value="jour">Chaque jour</option><option value="semaine">Chaque semaine</option><option value="mois">Chaque mois</option>
                </select>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{color:"#666",fontSize:12}}>Bloquer le badge</label>
                <button onClick={()=>onSaveEpiConfig({...epiConfig,bloquer:!epiConfig?.bloquer})} style={{width:44,height:24,borderRadius:12,background:epiConfig?.bloquer?"#fc5c65":"#252840",border:"none",position:"relative",cursor:"pointer"}}><div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:2,left:epiConfig?.bloquer?22:2,transition:"left .2s"}}/></button>
                <span style={{color:"#666",fontSize:11}}>{epiConfig?.bloquer?"Oui":"Non"}</span>
              </div>
              <div style={{color:"#888",fontSize:11}}>⚠️ Blocage auto à 15 jours sans contrôle</div>
            </div>
          </div>

          {/* Conformité par salarié — trié par dernière mise à jour */}
          <div className="card" style={{padding:18}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:17,fontWeight:700,marginBottom:14}}>Conformité par salarié</div>
            {salaries.filter(s=>s.actif).length===0?<div style={{color:"#444",fontSize:13,textAlign:"center",padding:20}}>Aucun salarié actif</div>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {salaries.filter(s=>s.actif)
                .map(s=>{const rec=epiRecords?.[s.code];return{...s,rec,lastUpdate:rec?.lastUpdate}})
                .sort((a,b)=>{
                  // Récentes en haut, jamais en bas
                  if(!a.lastUpdate&&!b.lastUpdate)return 0;
                  if(!a.lastUpdate)return 1;if(!b.lastUpdate)return-1;
                  return new Date(b.lastUpdate)-new Date(a.lastUpdate);
                })
                .map(s=>{
                const rec=s.rec;
                const overdue=isEpiOverdue(rec?.lastUpdate,rec?.firstSeen);
                const jours=joursDepuisEpi(rec?.lastUpdate);
                const restants=joursRestantsEpi(rec?.lastUpdate,rec?.firstSeen);
                const manquants=getEpiManquants(rec);
                const nonValides=getEpiNonValides(rec);
                const nbPhotos=rec?.photos?EPI_ITEMS.filter(e=>rec.photos[e.id]?.data).length:0;
                const nbValides=rec?.validations?EPI_ITEMS.filter(e=>rec.validations[e.id]).length:0;
                const ok=nbPhotos===EPI_ITEMS.length&&nbValides===EPI_ITEMS.length;
                const isExpanded=epiViewCode===s.code;

                return(<div key={s.code}>
                  <div style={{display:"flex",alignItems:"center",background:"#0B0C14",borderRadius:isExpanded?"12px 12px 0 0":"12px",padding:"10px 14px",border:`1px solid ${ok?"#26de8118":overdue?"#fc5c6533":"#F7B73133"}`,gap:12,flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setEpiViewCode(isExpanded?null:s.code)}>
                    <div style={{width:38,height:38,borderRadius:10,background:"#FF5A1F22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#FF5A1F",fontFamily:"'Barlow Condensed'",flexShrink:0}}>{s.code}</div>
                    <div style={{flex:1,minWidth:100}}>
                      <div style={{fontWeight:700,fontSize:14}}>{s.prenom} {s.nom}</div>
                      <div style={{color:"#555",fontSize:12}}>{rec?.lastUpdate?`Mis à jour le ${fmt(rec.lastUpdate,"dateFull")}`:rec?.firstSeen?`Premier badge le ${fmt(rec.firstSeen,"dateFull")}`:"Jamais pointé"} · {nbPhotos}/{EPI_ITEMS.length} photos · {nbValides}/{EPI_ITEMS.length} validées</div>
                    </div>
                    <Tag color={ok?"#26de81":overdue?"#fc5c65":!rec?.firstSeen?"#555":"#F7B731"}>{ok?"✅ Conforme":overdue?"⛔ Bloqué":!rec?.firstSeen?"—":`${restants}j restants`}</Tag>
                    <span style={{color:"#555",fontSize:14}}>{isExpanded?"▲":"▼"}</span>
                  </div>

                  {/* Photos inline sous le salarié */}
                  {isExpanded&&(
                    <div style={{background:"#0a0b12",borderRadius:"0 0 12px 12px",padding:16,border:"1px solid #1C1F35",borderTop:"none"}}>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
                        {EPI_ITEMS.map(item=>{
                          const photo=rec?.photos?.[item.id];
                          const validated=rec?.validations?.[item.id];
                          return(
                            <div key={item.id} style={{background:"#12131E",borderRadius:10,padding:10,border:`1px solid ${validated?"#26de8133":photo?"#F7B73133":"#252840"}`,textAlign:"center"}}>
                              <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600}}>{item.icon} {item.label}</div>
                              {photo?.data?(
                                <div>
                                  <img src={photo.data} style={{width:"100%",borderRadius:6,border:`2px solid ${validated?"#26de81":"#F7B731"}`,marginBottom:8}}/>
                                  <div style={{fontSize:10,color:"#555",marginBottom:6}}>{photo.takenAt?fmt(photo.takenAt,"dateFull"):""}</div>
                                  {validated?(
                                    <Btn small full variant="success" onClick={async()=>{const updated={...rec,validations:{...rec.validations,[item.id]:false}};await fbSet(`epi/${s.code}`,updated);onRefresh()}}>✅ Validé</Btn>
                                  ):(
                                    <Btn small full variant="warning" onClick={async()=>{const updated={...rec,validations:{...rec.validations,[item.id]:true}};await fbSet(`epi/${s.code}`,updated);onRefresh();logAdminAction("valider_epi",{code:s.code,item:item.id})}}>⏳ Valider</Btn>
                                  )}
                                </div>
                              ):(
                                <div style={{paddingTop:"60%",position:"relative"}}>
                                  <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#333",fontSize:12}}>Pas de photo</div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>);
              })}
            </div>}
          </div>
        </div>)}

        {/* ── HISTORIQUE ── */}
        {tab==="pointages"&&(<div className="anim">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>Historique</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><Btn small onClick={()=>exporterExcel(pointages,chantiers,salaries)} variant="secondary">📊 Excel</Btn><Btn small onClick={()=>setShowManuel(true)} variant="secondary">✏️</Btn><Btn small onClick={()=>{if(confirm("Supprimer aujourd'hui ?"))onClearToday()}} variant="danger">🗑️ Aujourd'hui</Btn><Btn small onClick={()=>{if(confirm("⚠️ TOUT supprimer ?"))onClearAll()}} variant="danger">🗑️ Tout</Btn></div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <select value={filterChantier} onChange={e=>setFilterChantier(e.target.value)} style={{maxWidth:200}}><option value="all">Tous les chantiers</option>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>
            <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{maxWidth:170}}/>
            {filterDate&&<Btn small onClick={()=>setFilterDate("")} variant="ghost">✕</Btn>}
            <div style={{marginLeft:"auto"}}><Tag color="#FF5A1F">{filteredP.length}</Tag></div>
          </div>
          {filteredP.length===0?<div className="card" style={{padding:"50px 20px",textAlign:"center",color:"#555"}}>Aucun pointage</div>
          :<div className="card" style={{overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:550}}>
            <thead><tr style={{background:"#0B0C14"}}>{["Date","Heure","Type","Code","Salarié","Chantier","GPS",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",color:"#444",fontSize:10,fontWeight:700,letterSpacing:1,borderBottom:"1px solid #1C1F35"}}>{h}</th>)}</tr></thead>
            <tbody>{filteredP.map((p,i)=>{const isSortie=p.type==="sortie";return(
              <tr key={p.id} style={{borderBottom:"1px solid #16172022",background:i%2?"#0a0b12":"transparent"}}>
                <td style={{padding:"9px 12px",color:"#666",fontSize:12}}>{fmt(p.timestamp,"date")}</td>
                <td style={{padding:"9px 12px",fontWeight:700,fontSize:13}}>{fmt(p.timestamp)}</td>
                <td style={{padding:"9px 12px"}}><Tag color={isSortie?"#45aaf2":"#26de81"}>{isSortie?"Départ":"Arrivée"}</Tag></td>
                <td style={{padding:"9px 12px",fontWeight:700,color:"#FF5A1F",fontSize:13}}>{p.code||"—"}</td>
                <td style={{padding:"9px 12px",fontWeight:600,fontSize:13}}>{p.prenom} {p.nom}</td>
                <td style={{padding:"9px 12px",fontSize:12}}>{p.chantierNom}</td>
                <td style={{padding:"9px 12px"}}>{p.manuel?<Tag color="#F7B731">Manuel</Tag>:p.spoofFlags?<Tag color="#fc5c65">⚠️ GPS suspect</Tag>:<Tag color={p.distance<100?"#26de81":"#F7B731"}>{p.distance}m{p.accuracy?` ±${p.accuracy}`:""}</Tag>}</td>
                <td style={{padding:"9px 12px"}}><Btn small onClick={()=>{if(confirm("Supprimer ?"))onDeletePointage(p.id)}} variant="danger">🗑️</Btn></td>
              </tr>)})}</tbody>
          </table></div>}
        </div>)}
      </div>

      {showQR&&<QRModal chantier={showQR} onClose={()=>setShowQR(null)} onChangeQR={id=>onChangeQR(id)}/>}
      {showPresence&&<PresenceModal chantier={showPresence} pointages={pointages} salaries={salaries} onClose={()=>setShowPresence(null)} onPurgeSalarie={onPurgeSalarie}/>}
      {showAdd&&<ChantierForm initial={null} onSave={d=>{onSaveChantier(d);setShowAdd(false)}} onClose={()=>setShowAdd(false)}/>}
      {editItem&&<ChantierForm initial={editItem} onSave={d=>{onSaveChantier(d);setEditItem(null)}} onClose={()=>setEditItem(null)}/>}
      {showManuel&&<SaisieManuelleModal chantiers={chantiers} salaries={salaries} onSave={p=>{onAddManuel(p);setShowManuel(false)}} onClose={()=>setShowManuel(false)}/>}
      {showAddSal&&<SalarieForm initial={null} salaries={salaries} onSave={s=>{onSaveSalarie(s);setShowAddSal(false)}} onClose={()=>setShowAddSal(false)}/>}
      {editSal&&<SalarieForm initial={editSal} salaries={salaries} onSave={s=>{onSaveSalarie(s);setEditSal(false)}} onClose={()=>setEditSal(null)} onDelete={code=>{onDeleteSalarie(code);setEditSal(null)}}/>}
    </div>
  );
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function AccesPage({onLogin}){
  const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  async function go(){
    setLoading(true);setErr("");await new Promise(r=>setTimeout(r,400));
    const h=await sha256(pw);
    if(h===_HASH){
      saveLocal("vonerlec:session","ok");
      onLogin();
    }else{setErr("Mot de passe incorrect");setLoading(false)}
  }
  return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div className="anim" style={{textAlign:"center",maxWidth:360,width:"100%"}}><div style={{fontSize:60,marginBottom:6}}>🏗️</div><div style={{fontFamily:"'Bebas Neue'",fontSize:48,color:"#FF5A1F",letterSpacing:4,lineHeight:1}}>VONERLEC</div><div style={{color:"#444",marginBottom:34,fontSize:12,letterSpacing:2,fontWeight:500}}>GESTION DE CHANTIER</div><div style={{background:"#12131E",borderRadius:16,padding:28,border:"1px solid #1C1F35"}}><label style={{color:"#555",fontSize:11,letterSpacing:1,display:"block",textAlign:"left",marginBottom:8,fontWeight:600}}>CODE D'ACCÈS</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" autoFocus style={{marginBottom:10,letterSpacing:4}}/>{err&&<div style={{color:"#fc5c65",fontSize:13,marginBottom:10,textAlign:"left"}}>⚠️ {err}</div>}<button onClick={go} disabled={loading||!pw} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:loading||!pw?"#1C1F35":"linear-gradient(135deg,#FF5A1F,#FF7A45)",color:loading||!pw?"#444":"#fff",fontWeight:700,fontSize:15,cursor:loading||!pw?"not-allowed":"pointer",marginTop:4}}>{loading?"...":"ACCÉDER →"}</button></div></div></div>);
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState("loading");
  const[chantiers,setChantiers]=useState([]);const[pointages,setPointages]=useState([]);
  const[salaries,setSalaries]=useState([]);const[epiRecords,setEpiRecords]=useState({});
  const[epiConfig,setEpiConfig]=useState({actif:false,frequence:"semaine",bloquer:false});
  const[badgeChantier,setBadgeChantier]=useState(null);
  const[storageUsed,setStorageUsed]=useState(0);
  const[alerts,setAlerts]=useState([]);

  async function loadAll(){
    const[rawC,rawP,rawS,rawE,rawEC,rawA]=await Promise.all([fbGet("chantiers"),fbGet("pointages"),fbGet("salaries"),fbGet("epi"),fbGet("epiConfig"),fbGet("alerts")]);
    const c=rawC?Object.values(rawC):[];setChantiers(c);
    const p=rawP?Object.values(rawP).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)):[];setPointages(p);
    let s=rawS?Object.values(rawS):[];
    // Initialiser les salariés par défaut si la base est vide
    if(s.length===0){
      s=DEFAULT_SALARIES;
      await fbSet("salaries",s.reduce((a,x)=>{a[x.code]=x;return a},{}));
    }
    setSalaries(s);
    const e=rawE||{};setEpiRecords(e);
    if(rawEC)setEpiConfig(rawEC);
    const a=rawA?Object.values(rawA).sort((x,y)=>new Date(y.timestamp)-new Date(x.timestamp)):[];setAlerts(a);
    // Estimation stockage en arrière-plan
    estimerStockage().then(bytes=>setStorageUsed(bytes)).catch(()=>{});
    return{c,p,s,e};
  }

  useEffect(()=>{
    (async()=>{
      const fromQR=decodeQRData(window.location.hash);
      if(fromQR){
        await loadAll();
        const ch=await loadChantierFromFirebase(fromQR.id);
        if(ch&&ch.qrVersion===fromQR.qrVersion){setBadgeChantier(ch);setView("badge");}
        else{setBadgeChantier(null);setView("badge");}
        return;
      }
      const session=loadLocal("vonerlec:session");
      if(session==="ok"){await loadAll();setView("admin");}
      else{await loadAll();setView("login");}
    })().catch(()=>{setView("login")});
  },[]);

  const persistC=async l=>{setChantiers(l);await fbSet("chantiers",l.reduce((a,c)=>{a[c.id]=c;return a},{}))};
  const persistP=async l=>{setPointages(l);await fbSet("pointages",l.reduce((a,p,i)=>{a[p.id||i]=p;return a},{}))};
  const persistS=async l=>{setSalaries(l);await fbSet("salaries",l.reduce((a,s)=>{a[s.code]=s;return a},{}))};

  function handleSaveChantier(d){
    let l;if(d.id){l=chantiers.map(c=>c.id===d.id?{...d,qrVersion:c.qrVersion||1,qrChangedAt:c.qrChangedAt}:c);logAdminAction("modifier_chantier",{id:d.id,nom:d.nom})}
    else{const newId=chantiers.length>0?Math.max(...chantiers.map(x=>x.id||0))+1:100;l=[...chantiers,{...d,id:newId,qrVersion:1,qrChangedAt:new Date().toISOString()}];logAdminAction("creer_chantier",{id:newId,nom:d.nom})}
    persistC(l);
  }
  function handleSaveSalarie(s){
    const exists=salaries.find(x=>x.code===s.code);
    if(exists){persistS(salaries.map(x=>x.code===s.code?s:x));logAdminAction("modifier_salarie",{code:s.code,nom:s.nom,prenom:s.prenom})}
    else{persistS([...salaries,s]);logAdminAction("creer_salarie",{code:s.code,nom:s.nom,prenom:s.prenom})}
  }
  function handleDeleteSalarie(code){
    const s=salaries.find(x=>x.code===code);
    persistS(salaries.filter(x=>x.code!==code));
    logAdminAction("supprimer_salarie",{code,nom:s?.nom,prenom:s?.prenom});
  }
  async function handleSaveEpiConfig(cfg){setEpiConfig(cfg);await fbSet("epiConfig",cfg);logAdminAction("modifier_epi_config",cfg)}

  if(view==="loading")return <div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center"}}><style>{css}</style><div style={{fontFamily:"'Bebas Neue'",fontSize:28,color:"#FF5A1F",letterSpacing:4,animation:"pulse 1.5s infinite"}}>VONERLEC...</div></div>;
  if(view==="badge")return <BadgePage chantier={badgeChantier} salaries={salaries} epiConfig={epiConfig}/>;
  if(view==="login")return <AccesPage onLogin={()=>{loadAll();setView("admin")}}/>;

  return <AdminApp
    chantiers={chantiers} pointages={pointages} salaries={salaries} epiRecords={epiRecords} epiConfig={epiConfig} storageUsed={storageUsed} alerts={alerts}
    onSaveChantier={handleSaveChantier}
    onDeleteChantier={async id=>{const ch=chantiers.find(c=>c.id===id);await persistC(chantiers.filter(c=>c.id!==id));logAdminAction("supprimer_chantier",{id,nom:ch?.nom})}}
    onDeletePointage={async id=>{await persistP(pointages.filter(p=>p.id!==id));logAdminAction("supprimer_pointage",{id})}}
    onChangeQR={id=>{persistC(chantiers.map(c=>c.id===id?{...c,qrVersion:(c.qrVersion||1)+1,qrChangedAt:new Date().toISOString()}:c));logAdminAction("changer_qr",{chantierId:id})}}
    onLogout={()=>{saveLocal("vonerlec:session",null);setView("login")}}
    onRefresh={loadAll}
    onAddManuel={async p=>{const u=[p,...pointages].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));await persistP(u);logAdminAction("saisie_manuelle",{code:p.code,type:p.type,chantier:p.chantierNom})}}
    onClearAll={async()=>{await fbDelete("pointages");await fbDelete("sessions");setPointages([]);logAdminAction("supprimer_tout",{count:pointages.length})}}
    onClearToday={async()=>{const t=new Date().toDateString();const n=pointages.filter(p=>new Date(p.timestamp).toDateString()===t).length;await persistP(pointages.filter(p=>new Date(p.timestamp).toDateString()!==t));await fbDelete("sessions");logAdminAction("supprimer_aujourdhui",{count:n})}}
    onPurgeSalarie={async(cId,code)=>{const t=new Date().toDateString();await persistP(pointages.filter(p=>!(new Date(p.timestamp).toDateString()===t&&p.chantierId===cId&&p.code===code)));await deleteSession(code,cId);logAdminAction("purger_salarie",{code,chantierId:cId})}}
    onSaveSalarie={handleSaveSalarie}
    onDeleteSalarie={handleDeleteSalarie}
    onSaveEpiConfig={handleSaveEpiConfig}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
