// Vérification complète côté serveur
// Retourne : { ok, etat, error }
//   etat: null | "entree" | "les_deux"
//   error: message si bloqué
async function verifierSession(code,chantierId,type){
  const sess=await getSession(code,chantierId);
  const deviceId=getDeviceId();
  if(!sess){
    // Pas de session → seule l'arrivée est possible
    if(type==="sortie") return {ok:false,etat:null,error:"⛔ Vous n'avez pas encore pointé l'arrivée aujourd'hui."};
    return {ok:true,etat:null,error:null};
  }
  // Session existe
  if(sess.entreeAt&&sess.sortieAt){
    // Journée complète
    return {ok:false,etat:"les_deux",error:"✅ Journée déjà complète (arrivée + départ)."};
  }
  if(sess.entreeAt&&!sess.sortieAt){
    // Arrivée faite, pas encore de sortie
    if(type==="entree") return {ok:false,etat:"entree",error:"⛔ Arrivée déjà enregistrée aujourd'hui."};
    // Sortie demandée → vérifier que c'est le même téléphone ET le même fingerprint
    if(sess.deviceId!==deviceId) return {ok:false,etat:"entree",error:"⛔ Le départ doit être badgé depuis le même téléphone que l'arrivée.\n\nUtilisez le téléphone avec lequel vous avez pointé ce matin."};
    // Double vérification fingerprint (user agent, écran, etc.)
    const fp=getDeviceFingerprint();
    if(sess.fingerprint&&sess.fingerprint!==fp) return {ok:false,etat:"entree",error:"⛔ Appareil non reconnu. Le départ doit être fait depuis le même navigateur que l'arrivée."};
    return {ok:true,etat:"entree",error:null};
  }
  return {ok:true,etat:null,error:null};
}

function haversineDistance(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function generateToken(id,v){const s=`${id}::v${v}::${SECRET}`;let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return Math.abs(h>>>0).toString(36).toUpperCase().padStart(8,"0")}
function fmt(ts,mode="time"){const d=new Date(ts);if(mode==="time")return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});if(mode==="date")return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"});if(mode==="dateFull")return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});return d.toLocaleString("fr-FR")}
function encodeQRData(ch){const v=ch.qrVersion||1,t=generateToken(ch.id,v);return btoa(unescape(encodeURIComponent(JSON.stringify({i:ch.id,t,v}))))}
function decodeQRData(hash){try{if(!hash.startsWith("#badge/"))return null;const d=JSON.parse(decodeURIComponent(escape(atob(hash.replace("#badge/","")))));if(d.t!==generateToken(d.i,d.v))return null;return{id:d.i,qrVersion:d.v}}catch{return null}}

// ─── GPS AMÉLIORÉ + ANTI-SPOOFING ───────────────────────────────────────────
function getAccuratePosition(timeout=15000){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("GPS non disponible"));return}
    let best=null;let readings=[];let startTime=Date.now();
    const wid=navigator.geolocation.watchPosition(pos=>{
      const elapsed=Date.now()-startTime;
      readings.push({lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy,t:elapsed});
      if(!best||pos.coords.accuracy<best.coords.accuracy)best=pos;
      if(pos.coords.accuracy<25&&elapsed>1500){navigator.geolocation.clearWatch(wid);resolve({position:best,readings})}
    },err=>{navigator.geolocation.clearWatch(wid);if(best)resolve({position:best,readings});else reject(err)},{enableHighAccuracy:true,timeout,maximumAge:0});
    setTimeout(()=>{navigator.geolocation.clearWatch(wid);if(best)resolve({position:best,readings});else reject(new Error("GPS timeout"))},timeout);
  });
}

// Détecte les signes de GPS falsifié
function detectGpsSpoofing(readings,accuracy){
  const flags=[];
  // 1. GPS trop rapide (< 800ms pour un fix) → suspect (le vrai GPS prend du temps)
  if(readings.length>0&&readings[0].t<800) flags.push("fix_instantane");
  // 2. Précision suspecte : exactement 0, ou < 3m en extérieur mobile → rare
  if(accuracy<=3) flags.push("precision_suspecte");
  if(accuracy===0) flags.push("precision_zero");
  // 3. Toutes les lectures identiques au millième → fake GPS renvoie une position fixe
  if(readings.length>=3){
    const allSame=readings.every(r=>r.lat===readings[0].lat&&r.lon===readings[0].lon);
    if(allSame) flags.push("position_statique_parfaite");
  }
  // 4. Accuracy ne varie jamais entre les lectures → suspect
  if(readings.length>=3){
    const allSameAcc=readings.every(r=>r.acc===readings[0].acc);
    if(allSameAcc&&readings[0].acc<50) flags.push("precision_constante");
  }
  return flags;
}

// ─── COMPRESSION PHOTO + ANTI-FRAUDE ─────────────────────────────────────────
function compressPhoto(file,maxW=480,quality=0.45){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const ratio=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*ratio;c.height=img.height*ratio;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',quality))};img.onerror=reject;img.src=e.target.result};
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}

// Vérifie que la photo vient bien de la caméra et pas d'une capture d'écran / galerie
function validatePhoto(file){
  const errors=[];
  // 1. Vérifier le type MIME
  if(!file.type.startsWith("image/")){errors.push("Le fichier n'est pas une image");return{ok:false,errors}}
  // 2. Taille minimale — une vraie photo caméra fait > 50 Ko, un screenshot peut être très léger
  if(file.size<30000) errors.push("Photo trop légère — utilisez la caméra, pas une capture d'écran");
  // 3. Taille maximale raisonnable  
  if(file.size>20000000) errors.push("Fichier trop volumineux");
  // 4. Vérifier que le nom de fichier ressemble à une photo caméra (pas "screenshot")
  const name=file.name.toLowerCase();
  if(name.includes("screenshot")||name.includes("capture")||name.includes("screen")) errors.push("Les captures d'écran ne sont pas acceptées — utilisez la caméra");
  // 5. Vérifier la date de dernière modification (doit être récente < 2 min)
  if(file.lastModified){
    const age=Date.now()-file.lastModified;
    if(age>120000) errors.push("Cette photo semble ancienne — prenez une photo maintenant");
  }
  return {ok:errors.length===0,errors};
}

// ─── DEVICE FINGERPRINT RENFORCÉ ─────────────────────────────────────────────
function getDeviceFingerprint(){
  const parts=[
    navigator.userAgent,
    screen.width+"x"+screen.height,
    screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.language,
    navigator.hardwareConcurrency||"?"
  ];
  // Hash simple du fingerprint
  let h=0;const s=parts.join("|");
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}
  return Math.abs(h).toString(36);
}

// ─── EPI LOGIC ───────────────────────────────────────────────────────────────
function epiRequis(lastEpiDate,frequence){
  if(!lastEpiDate)return true;
  const diffDays=Math.floor((new Date()-new Date(lastEpiDate))/(86400000));
  if(frequence==="jour")return diffDays>=1;
  if(frequence==="semaine")return diffDays>=7;
  if(frequence==="mois")return diffDays>=30;
  return false;
}
function joursDepuisEpi(lastDate){
  if(!lastDate)return 0; // Jamais fait → compteur à 0, pas 15
  return Math.min(Math.floor((new Date()-new Date(lastDate))/86400000),15);
}
function joursRestantsEpi(lastDate,firstPointageDate){
  // Si jamais fait d'EPI → le compteur démarre depuis le premier pointage
  if(!lastDate){
    if(!firstPointageDate)return 15; // Jamais pointé → 15 jours restants
    const joursSinceFirst=Math.floor((new Date()-new Date(firstPointageDate))/86400000);
    return Math.max(15-joursSinceFirst,0);
  }
  const jours=Math.floor((new Date()-new Date(lastDate))/86400000);
  return Math.max(15-jours,0);
}
// Hard block : seulement si le salarié a pointé depuis plus de 15 jours sans EPI
function isEpiOverdue(lastEpiDate,firstPointageDate){
  if(lastEpiDate){
    // A fait un EPI → bloqué si > 15 jours
    return Math.floor((new Date()-new Date(lastEpiDate))/86400000)>=15;
  }
  // Jamais fait d'EPI → bloqué seulement si premier pointage > 15 jours
  if(!firstPointageDate)return false; // Jamais pointé → pas bloqué
  return Math.floor((new Date()-new Date(firstPointageDate))/86400000)>=15;
}
// Trouver les EPI manquants (pas de photo)
function getEpiManquants(epiRecord){
  if(!epiRecord||!epiRecord.photos)return EPI_ITEMS.map(e=>e.id);
  return EPI_ITEMS.filter(item=>{
    const p=epiRecord.photos[item.id];
    return !p||!p.data;
  }).map(e=>e.id);
}
function getEpiNonValides(epiRecord){
  if(!epiRecord||!epiRecord.validations)return EPI_ITEMS.map(e=>e.id);
  return EPI_ITEMS.filter(item=>!epiRecord.validations[item.id]).map(e=>e.id);
}

// ─── EXCEL EXPORT ────────────────────────────────────────────────────────────
function exporterExcel(pointages,chantiers,salaries){
  const grouped={};
  pointages.forEach(p=>{
    const sal=salaries.find(s=>s.code===p.code)||{nom:p.nom||"?",prenom:p.prenom||"?"};
    const dateStr=new Date(p.timestamp).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
    const key=`${p.code}__${dateStr}__${p.chantierId}`;
    if(!grouped[key])grouped[key]={code:p.code,nom:sal.nom,prenom:sal.prenom,chantier:p.chantierNom,date:dateStr,entree:null,sortie:null,distE:null,distS:null,manE:false,manS:false};
    if(p.type!=="sortie"&&!grouped[key].entree){grouped[key].entree=fmt(p.timestamp);grouped[key].distE=p.distance;grouped[key].manE=!!p.manuel}
    if(p.type==="sortie"&&!grouped[key].sortie){grouped[key].sortie=fmt(p.timestamp);grouped[key].distS=p.distance;grouped[key].manS=!!p.manuel}
  });
  const lignes=Object.values(grouped).map(g=>{
    let duree="";
    if(g.entree&&g.sortie){try{const[he,me]=g.entree.split(":");const[hs,ms]=g.sortie.split(":");const dm=(parseInt(hs)*60+parseInt(ms))-(parseInt(he)*60+parseInt(me));if(dm>0)duree=`${Math.floor(dm/60)}h${(dm%60).toString().padStart(2,"0")}`}catch{}}
    return{"Date":g.date,"Code":g.code,"Nom":g.nom,"Prénom":g.prenom,"Chantier":g.chantier,"Arrivée":g.entree||"—","Départ":g.sortie||"—","Durée":duree||"—","GPS Arr.(m)":g.distE!=null?g.distE:"—","GPS Dép.(m)":g.distS!=null?g.distS:"—","Manuel":(g.manE||g.manS)?"Oui":"Non"}
  });
  lignes.sort((a,b)=>{const[da,ma,ya]=a["Date"].split("/");const[db,mb,yb]=b["Date"].split("/");const dA=new Date(`${ya}-${ma}-${da}`),dB=new Date(`${yb}-${mb}-${db}`);return dB-dA||a["Nom"].localeCompare(b["Nom"])});
  const ws=XLSX.utils.json_to_sheet(lignes);ws["!cols"]=[{wch:12},{wch:8},{wch:16},{wch:14},{wch:22},{wch:8},{wch:8},{wch:8},{wch:12},{wch:12},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Pointages");
  // Résumé
  const rMap={};lignes.forEach(l=>{const k=l["Code"];if(!rMap[k])rMap[k]={"Code":l["Code"],"Nom":l["Nom"],"Prénom":l["Prénom"],jours:0,totalMin:0};rMap[k].jours++;if(l["Durée"]!=="—"){const m=l["Durée"].match(/(\d+)h(\d+)/);if(m)rMap[k].totalMin+=parseInt(m[1])*60+parseInt(m[2])}});
  const resume=Object.values(rMap).map(r=>({"Code":r["Code"],"Nom":r["Nom"],"Prénom":r["Prénom"],"Jours pointés":r.jours,"Heures totales":r.totalMin>0?`${Math.floor(r.totalMin/60)}h${(r.totalMin%60).toString().padStart(2,"0")}`:"—"}));
  const ws2=XLSX.utils.json_to_sheet(resume);ws2["!cols"]=[{wch:8},{wch:16},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws2,"Résumé salariés");
  XLSX.writeFile(wb,`Vonerlec_Rapport_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.xlsx`);
}

  input,select{outline:none;background:#151724;border:1.5px solid #252840;color:#f0f0f0;border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color .2s}
  input:focus,select:focus{border-color:#FF5A1F;box-shadow:0 0 0 3px rgba(255,90,31,.1)}input::placeholder{color:#3a3d55}
  button{cursor:pointer;font-family:'DM Sans',sans-serif}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.85);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  @keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes ping{0%{transform:scale(1);opacity:1}75%,100%{transform:scale(2.2);opacity:0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .anim{animation:fadeIn .35s ease forwards}.pop{animation:pop .45s ease forwards}
  .card{background:#12131E;border-radius:14px;border:1px solid #1C1F35}
`;

// ─── COMPOSANTS BASE ─────────────────────────────────────────────────────────
function Btn({children,onClick,variant="primary",disabled,small,full,style:s}){
  const base={display:"inline-flex",alignItems:"center",gap:8,justifyContent:"center",borderRadius:10,fontWeight:600,border:"none",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"all .15s",padding:small?"8px 14px":"12px 22px",fontSize:small?12:14,width:full?"100%":undefined,...s};
  const v={primary:{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",color:"#fff",boxShadow:"0 2px 12px rgba(255,90,31,.25)"},secondary:{background:"#1C1F35",color:"#bbb",border:"1.5px solid #252840"},danger:{background:"#2a1218",color:"#fc5c65",border:"1.5px solid #fc5c6533"},success:{background:"#0f2a1f",color:"#26de81",border:"1.5px solid #26de8133"},ghost:{background:"transparent",color:"#666",border:"1.5px solid #252840"},warning:{background:"#2a2010",color:"#F7B731",border:"1.5px solid #F7B73133"}};
  return <button style={{...base,...v[variant]}} onClick={disabled?undefined:onClick}>{children}</button>;
}
function Tag({color,children}){return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:color+"18",color,fontSize:11,fontWeight:600,border:`1px solid ${color}33`,letterSpacing:.3}}>{children}</span>}
function Modal({children,onClose,width=520}){
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={onClose}><div className="anim" style={{background:"#12131E",borderRadius:18,padding:28,width:"100%",maxWidth:width,border:"1px solid #252840",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.6)"}} onClick={e=>e.stopPropagation()}>{children}</div></div>);
}
function Toast({msg,sub,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,5000);return()=>clearTimeout(t)},[]);
  return(<div onClick={onClose} style={{position:"fixed",top:16,left:"50%",zIndex:2000,background:"#0f2a1f",border:"1.5px solid #26de81",borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,minWidth:280,maxWidth:400,boxShadow:"0 12px 40px rgba(0,0,0,.6)",cursor:"pointer",animation:"slideDown .4s ease forwards"}}><div style={{position:"relative",flexShrink:0}}><div style={{width:10,height:10,borderRadius:"50%",background:"#26de81"}}/><div style={{position:"absolute",inset:0,borderRadius:"50%",background:"#26de81",animation:"ping 1.2s ease-out infinite"}}/></div><div><div style={{color:"#26de81",fontWeight:700,fontSize:14}}>{msg}</div>{sub&&<div style={{color:"#26de8188",fontSize:12,marginTop:2}}>{sub}</div>}</div><div style={{marginLeft:"auto",color:"#26de8144",fontSize:20}}>×</div></div>);
}

// ─── PAGE EPI (SALARIÉ) ──────────────────────────────────────────────────────
function EpiCapturePage({salarie,chantierId,chantierNom,existingEpi,onComplete,onSkip}){
  const[step,setStep]=useState(0);
  const[photos,setPhotos]=useState({});
  const[uploading,setUploading]=useState(false);
  const fileRef=useRef();

  // Déterminer quels items manquent
  const manquants=existingEpi?getEpiManquants(existingEpi):EPI_ITEMS.map(e=>e.id);
  const itemsToShow=manquants.length>0?EPI_ITEMS.filter(e=>manquants.includes(e.id)):EPI_ITEMS;
  const current=itemsToShow[step];

  async function handlePhoto(e){
    const file=e.target.files?.[0];if(!file)return;
    const check=validatePhoto(file);
    if(!check.ok){alert("⛔ "+check.errors.join("\n"));fileRef.current.value="";return}
    try{
      const compressed=await compressPhoto(file);
      const updated={...photos,[current.id]:{data:compressed,takenAt:new Date().toISOString(),size:file.size}};
      setPhotos(updated);
      if(step<itemsToShow.length-1)setTimeout(()=>setStep(step+1),400);
    }catch{alert("Erreur lors de la compression")}
  }

  async function soumettre(){
    setUploading(true);
    // Fusionner avec les photos existantes (overwrite par item)
    const existingPhotos=existingEpi?.photos||{};
    const existingValidations=existingEpi?.validations||{};
    const mergedPhotos={...existingPhotos};
    const mergedValidations={...existingValidations};
    Object.entries(photos).forEach(([k,v])=>{
      mergedPhotos[k]={data:v.data,takenAt:v.takenAt,size:v.size};
      mergedValidations[k]=false; // Nouvelle photo = revalider
    });
    await fbSet(`epi/${salarie.code}`,{
      code:salarie.code,nom:salarie.nom,prenom:salarie.prenom,
      chantierId,chantierNom,
      lastUpdate:new Date().toISOString(),
      photos:mergedPhotos,
      validations:mergedValidations,
      deviceFingerprint:getDeviceFingerprint()
    });
    setUploading(false);
    onComplete();
  }

  const progress=Object.keys(photos).length;
  const allDone=progress===itemsToShow.length;

  return(
    <div style={{minHeight:"100vh",background:"#0B0C14",padding:16,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <style>{css}</style>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{background:"linear-gradient(135deg,#F7B731,#FF5A1F)",padding:"18px 20px",borderRadius:"16px 16px 0 0"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#fff",opacity:.8}}>CONTRÔLE EPI</div>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800,color:"#fff",marginTop:2}}>🛡️ Point Sécurité</div>
          <div style={{fontSize:12,color:"#ffffff88",marginTop:4}}>{salarie.prenom} {salarie.nom} · {manquants.length} élément{manquants.length>1?"s":""} manquant{manquants.length>1?"s":""}</div>
        </div>
        <div style={{background:"#12131E",borderRadius:"0 0 16px 16px",padding:20,border:"1px solid #252840",borderTop:"none"}}>
          <div style={{display:"flex",gap:3,marginBottom:20}}>
            {itemsToShow.map((item,i)=>(
              <div key={item.id} style={{flex:1,height:4,borderRadius:2,background:photos[item.id]?"#26de81":i===step?"#FF5A1F":"#252840",transition:"all .3s"}}/>
            ))}
          </div>
          <div style={{color:"#666",fontSize:12,marginBottom:12,textAlign:"center"}}>{progress}/{itemsToShow.length} photos prises</div>

          {!allDone&&current?(
            <div className="anim" key={step}>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:56,marginBottom:8}}>{current.icon}</div>
                <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700}}>Photographiez : {current.label}</div>
                <div style={{color:"#666",fontSize:13,marginTop:6}}>Prenez une photo nette de l'équipement</div>
              </div>
              {photos[current.id]?(
                <div style={{textAlign:"center"}}>
                  <img src={photos[current.id].data} alt={current.label} style={{width:"100%",maxWidth:280,borderRadius:12,border:"2px solid #26de81",marginBottom:12}}/>
                  <div style={{color:"#26de81",fontWeight:600,fontSize:13,marginBottom:12}}>✅ Photo enregistrée</div>
                  <div style={{display:"flex",gap:8}}>
                    <Btn full variant="ghost" small onClick={()=>fileRef.current?.click()}>📷 Reprendre</Btn>
                    {step<itemsToShow.length-1&&<Btn full small onClick={()=>setStep(step+1)}>Suivant →</Btn>}
                  </div>
                </div>
              ):(
                <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:24,borderRadius:14,border:"2px dashed #FF5A1F44",background:"#FF5A1F08",color:"#FF5A1F",fontWeight:700,fontSize:16,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  📷 Prendre la photo
                  <span style={{fontSize:12,fontWeight:400,color:"#666"}}>Appuyez pour ouvrir la caméra</span>
                </button>
              )}
              <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
              <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap",justifyContent:"center"}}>
                {itemsToShow.map((item,i)=>(
                  <button key={item.id} onClick={()=>setStep(i)} style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${photos[item.id]?"#26de81":i===step?"#FF5A1F":"#252840"}`,background:photos[item.id]?"#26de8118":i===step?"#FF5A1F18":"transparent",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} title={item.label}>
                    {photos[item.id]?"✅":item.icon}
                  </button>
                ))}
              </div>
            </div>
          ):(
            <div className="pop" style={{textAlign:"center"}}>
              <div style={{fontSize:60,marginBottom:8}}>🎉</div>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#26de81",fontWeight:700}}>Photos prises !</div>
              <div style={{color:"#666",fontSize:13,marginTop:6,marginBottom:18}}>Validez pour enregistrer</div>
              <Btn full onClick={soumettre} disabled={uploading}>{uploading?"⏳ Envoi...":"✅ Enregistrer les photos"}</Btn>
            </div>
          )}
          {onSkip&&<div style={{textAlign:"center",marginTop:16}}><button onClick={onSkip} style={{background:"none",border:"none",color:"#444",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Passer pour l'instant</button></div>}
        </div>
      </div>
    </div>
  );
}

// ─── PAGE BADGE ──────────────────────────────────────────────────────────────
function BadgePage({chantier,salaries,epiConfig}){
  const[code,setCode]=useState("");
  const[salarie,setSalarie]=useState(null);
  const[codeLocked,setCodeLocked]=useState(false);
  const[type,setType]=useState("entree");
  const[etatJour,setEtatJour]=useState(null);
  const[status,setStatus]=useState("loading");
  const[gpsInfo,setGpsInfo]=useState("");
  const[error,setError]=useState("");
  const[result,setResult]=useState(null);
  const[showEpi,setShowEpi]=useState(false);
  const[epiData,setEpiData]=useState(null);
  const[countdown,setCountdown]=useState(null);

  // Au chargement : vérifier si un code est mémorisé + vérifier la session serveur
  useEffect(()=>{
    async function init(){
      const sc=loadLocal("vonerlec:code");
      if(sc&&chantier){
        const s=salaries.find(x=>x.code===sc);
        if(s){
          setSalarie(s);setCode(sc);
          // Vérifier session serveur
          const sess=await getSession(sc,chantier.id);
          if(sess){
            const deviceId=getDeviceId();
            if(sess.entreeAt&&sess.sortieAt){
              setEtatJour("les_deux");setCodeLocked(true);
            }else if(sess.entreeAt){
              // Arrivée faite → vérifier que c'est le bon device
              if(sess.deviceId===deviceId){
                setEtatJour("entree");setType("sortie");setCodeLocked(true);
              }else{
                // Pas le bon téléphone → ne pas charger ce code, forcer saisie
                setSalarie(null);setCode("");setCodeLocked(false);
                setError("⛔ Ce code est déjà utilisé sur un autre téléphone aujourd'hui.");
              }
            }
          }
        }
      }
      fbGet("epi").then(raw=>{if(raw)setEpiData(raw);else setEpiData({})});
      setStatus("form");
    }
    init();
  },[]);

  async function validerCode(){
    const c=code.trim().toUpperCase();
    // Anti brute-force : max 5 tentatives par 15 min
    const bf=checkBruteForce();
    if(bf.blocked){setError("⛔ Trop de tentatives incorrectes. Réessayez dans 15 minutes.");return}
    const s=salaries.find(x=>x.code===c);
    if(!s){
      recordBruteForceAttempt();
      const remaining=4-bf.count;
      setError(`❌ Code inconnu.${remaining>0?` ${remaining} tentative${remaining>1?"s":""} restante${remaining>1?"s":""}.`:""}`);
      // Log la tentative échouée côté serveur
      fbPush("alerts",{type:"code_inconnu",code:c,chantierId:chantier?.id,deviceId:getDeviceId(),timestamp:new Date().toISOString()});
      return;
    }
    if(!s.actif){setError("⛔ Ce compte est désactivé.");return}
    // Vérifier côté serveur si ce code a déjà une session active
    if(chantier){
      const sess=await getSession(c,chantier.id);
      if(sess&&sess.entreeAt&&!sess.sortieAt){
        if(sess.deviceId!==getDeviceId()){
          setError("⛔ Ce code a déjà été utilisé sur un autre téléphone aujourd'hui.\n\nLe départ doit être badgé depuis le même téléphone que l'arrivée.");
          return;
        }
        setType("sortie");setEtatJour("entree");setCodeLocked(true);
      }else if(sess&&sess.entreeAt&&sess.sortieAt){
        setEtatJour("les_deux");setCodeLocked(true);
      }
    }
    setSalarie(s);saveLocal("vonerlec:code",c);setError("");
  }

  function getExistingEpi(){
    if(!salarie||!epiData)return null;
    return epiData[salarie.code]||null;
  }

  function checkEpiRequired(){
    if(!epiConfig||!epiConfig.actif||!salarie)return false;
    const existing=getExistingEpi();
    const lastDate=existing?.lastUpdate;
    return epiRequis(lastDate,epiConfig.frequence);
  }

  function isEpiHardBlocked(){
    if(!epiConfig||!epiConfig.actif||!salarie)return false;
    const existing=getExistingEpi();
    const lastDate=existing?.lastUpdate;
    // Utiliser firstSeen stocké dans l'EPI record, ou null
    const firstSeen=existing?.firstSeen;
    return isEpiOverdue(lastDate,firstSeen);
  }

  function getEpiAlertInfo(){
    const existing=getExistingEpi();
    const manquants=getEpiManquants(existing);
    const nonValides=getEpiNonValides(existing);
    const firstSeen=existing?.firstSeen;
    const restants=joursRestantsEpi(existing?.lastUpdate,firstSeen);
    return{manquants,nonValides,restants,hasPhotos:!!existing?.photos};
  }

  async function pointer(bypassEpi){
    if(!salarie){setError("Entrez votre code");return}
    setError("");
    // Vérification serveur anti-triche
    const verif=await verifierSession(salarie.code,chantier.id,type);
    if(!verif.ok){
      if(verif.etat)setEtatJour(verif.etat);
      setError(verif.error);
      return;
    }
    // Check EPI si arrivée — hard block à 15 jours (bypass si photos viennent d'être envoyées)
    if(!bypassEpi&&type==="entree"&&checkEpiRequired()){
      if(epiConfig.bloquer||isEpiHardBlocked()){setShowEpi(true);return}
    }
    setStatus("checking");setGpsInfo("Recherche GPS...");
    try{
      const gpsResult=await getAccuratePosition(15000);
      const pos=gpsResult.position;
      const readings=gpsResult.readings;
      const acc=Math.round(pos.coords.accuracy);
      setGpsInfo(`Précision : ${acc}m (${readings.length} lectures)`);
      
      // Détection GPS falsifié
      const spoofFlags=detectGpsSpoofing(readings,acc);
      const isSuspect=spoofFlags.length>=2; // 2+ flags = très suspect
      
      const dist=haversineDistance(pos.coords.latitude,pos.coords.longitude,chantier.lat,chantier.lon);
      if(dist>chantier.rayon){setStatus("form");setError(`⛔ Vous êtes à ${Math.round(dist)}m du chantier (zone : ${chantier.rayon}m). Précision GPS : ${acc}m`);return}
      
      const p={id:Date.now(),chantierId:chantier.id,chantierNom:chantier.nom,code:salarie.code,nom:salarie.nom,prenom:salarie.prenom,type,timestamp:new Date().toISOString(),distance:Math.round(dist),accuracy:acc,gpsReadings:readings.length,spoofFlags:spoofFlags.length>0?spoofFlags:null,deviceFingerprint:getDeviceFingerprint()};
      
      // Si GPS très suspect → bloquer ou marquer
      if(isSuspect){
        setStatus("form");
        setError("⛔ GPS suspect détecté.\n\nDésactivez toute application de localisation fictive et réessayez.\n\nSi le problème persiste, attendez quelques secondes à l'extérieur pour un meilleur signal GPS.");
        // Log la tentative suspecte côté serveur
        fbPush("alerts",{code:salarie.code,chantierId:chantier.id,chantierNom:chantier.nom,type:"gps_suspect",flags:spoofFlags,timestamp:new Date().toISOString(),distance:Math.round(dist),accuracy:acc});
        return;
      }
      
      // Enregistrer côté serveur
      if(type==="entree"){
        await createSession(salarie.code,chantier.id,getDeviceId());
        setCodeLocked(true);
      }else{
        await closeSession(salarie.code,chantier.id);
      }
      await fbPush("pointages",p);
      // Si premier pointage et pas d'EPI → créer un marqueur firstSeen pour le compteur 15 jours
      if(type==="entree"&&epiConfig?.actif){
        const existing=getExistingEpi();
        if(!existing){
          await fbSet(`epi/${salarie.code}`,{code:salarie.code,nom:salarie.nom,prenom:salarie.prenom,firstSeen:new Date().toISOString(),photos:{},validations:{}});
          fbGet("epi").then(raw=>{if(raw)setEpiData(raw)});
        }
      }
      setResult(p);setStatus("success");
      setEtatJour(type==="entree"?"entree":"les_deux");
      // Compte à rebours de fermeture après tout pointage
      {let c=30;setCountdown(c);
        const iv=setInterval(()=>{c--;setCountdown(c);if(c<=0){clearInterval(iv);window.close();setTimeout(()=>window.location.replace("about:blank"),300);}},1000);}
      // Proposer EPI après badge si requis et non bloquant
      if(type==="entree"&&epiConfig?.actif&&checkEpiRequired()&&!epiConfig.bloquer&&!isEpiHardBlocked()){
        setTimeout(()=>setShowEpi(true),2000);
      }
    }catch(err){
      setStatus("form");
      if(err?.code===1)setError("⛔ GPS refusé. Autorisez la localisation.\n\nAndroid : Paramètres → Chrome → Autorisations → Localisation\niOS : Réglages → Safari → Localisation");
      else setError("GPS indisponible. Vérifiez que le GPS est activé et réessayez.");
    }
  }

  if(showEpi&&salarie) return <EpiCapturePage salarie={salarie} chantierId={chantier.id} chantierNom={chantier.nom} existingEpi={getExistingEpi()} onComplete={()=>{setShowEpi(false);fbGet("epi").then(raw=>{if(raw)setEpiData(raw)});if(status!=="success")setTimeout(()=>pointer(true),300)}} onSkip={(epiConfig.bloquer||isEpiHardBlocked())?null:()=>setShowEpi(false)}/>;

  if(!chantier)return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div style={{textAlign:"center",background:"#12131E",borderRadius:18,padding:32,border:"1px solid #fc5c6533",maxWidth:360}}><div style={{fontSize:60,marginBottom:12}}>❌</div><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#fc5c65",marginBottom:12}}>QR Code invalide</div><div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Ce QR a été désactivé.<br/><strong style={{color:"#aaa"}}>Demandez le nouveau QR à votre responsable.</strong></div></div></div>);

  if(status==="loading")return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center"}}><style>{css}</style><div className="anim" style={{textAlign:"center"}}><div style={{fontSize:60,marginBottom:12}}>🛡️</div><div style={{fontFamily:"'Barlow Condensed'",fontSize:20,color:"#26de81",letterSpacing:2}}>Connexion sécurisée</div></div></div>);

  if(etatJour==="les_deux")return(<div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{css}</style><div style={{textAlign:"center",background:"#12131E",borderRadius:18,padding:32,border:"1px solid #26de8133",maxWidth:360,width:"100%"}}><div style={{fontSize:60,marginBottom:12}}>✅</div><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#26de81",marginBottom:8}}>Journée complète !</div><div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Arrivée et départ pointés sur <strong style={{color:"#FF5A1F"}}>{chantier.nom}</strong>.<br/>À demain ! 👋</div><button onClick={()=>{window.close();setTimeout(()=>window.location.replace("about:blank"),300)}} style={{marginTop:24,width:"100%",padding:16,borderRadius:12,border:"none",background:"linear-gradient(135deg,#45aaf2,#2d7fcf)",color:"#fff",fontWeight:800,fontSize:17,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 20px #45aaf244"}}>🔒 FERMER MA SESSION</button></div></div>);

  const isEntree=type==="entree";
  const couleurType=isEntree?"#26de81":"#45aaf2";

  return(
    <div style={{minHeight:"100vh",background:"#0B0C14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      {status==="success"?(
        <div className="pop" style={{textAlign:"center",maxWidth:400,width:"100%",background:"#12131E",borderRadius:18,padding:30,border:`1px solid ${couleurType}33`}}>
          <div style={{fontSize:80,marginBottom:8}}>{isEntree?"✅":"👋"}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:couleurType,letterSpacing:2}}>{isEntree?"ARRIVÉE OK !":"DÉPART OK !"}</div>
          <div style={{color:"#aaa",marginTop:8,fontSize:15}}>Bonne {isEntree?"journée":"fin de journée"} <strong style={{color:"#fff"}}>{salarie.prenom}</strong> !</div>
          <div style={{marginTop:18,background:"#0B0C14",borderRadius:12,padding:"14px 18px",border:"1px solid #1C1F35",textAlign:"left"}}>
            {[["Chantier",chantier.nom,null],["Type",isEntree?"🟢 Arrivée":"🔵 Départ",couleurType],["Heure",fmt(result.timestamp),"#f0f0f0"],["GPS",`✓ ${result.distance}m (±${result.accuracy}m)`,"#26de81"]].map(([l,v,c])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:14}}><span style={{color:"#666"}}>{l}</span><span style={{fontWeight:700,color:c||"#f0f0f0"}}>{v}</span></div>))}
          </div>
          {(
            <div style={{marginTop:20}}>

              {[["entree","🟢 ARRIVÉE","#26de81"],["sortie","🔵 DÉPART","#45aaf2"]].map(([t,label,color])=>{
                const deja=etatJour==="entree"&&t==="entree";
                const locked=etatJour==="entree"; // Si arrivée faite, on ne peut que sortie
                return(<button key={t} onClick={()=>{if(!deja&&!locked){setType(t);setError("")}else if(locked&&t==="sortie"){setType("sortie");setError("")}}} style={{flex:1,padding:"14px 8px",borderRadius:10,border:`2px solid ${type===t&&!deja?color:"#252840"}`,background:deja?"#0a0a0a":type===t?color+"18":"#0B0C14",color:deja?"#333":type===t?color:"#555",fontWeight:700,fontSize:14,cursor:deja?"not-allowed":"pointer",letterSpacing:1}}>{label}{deja&&<div style={{fontSize:10,marginTop:3,color:"#444"}}>✓ déjà pointée</div>}</button>);
              })}

            {/* CODE SALARIÉ — verrouillé après badge */}

              <div style={{background:codeLocked?"#0f1a10":"#1a1030",borderRadius:10,padding:"12px 15px",marginBottom:16,border:`1px solid ${codeLocked?"#26de8133":"#7C5CBF33"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>

                  <div style={{fontWeight:700,fontSize:17}}>{salarie.prenom} {salarie.nom}</div>
                </div>
                {!codeLocked&&<button onClick={()=>{setSalarie(null);setCode("");saveLocal("vonerlec:code",null)}} style={{background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textDecoration:"underline",flexShrink:0}}>Changer</button>}

                  <button onClick={validerCode} style={{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",border:"none",borderRadius:10,color:"#fff",padding:"0 20px",fontWeight:700,cursor:"pointer",flexShrink:0,fontSize:14}}>OK</button>
                </div>
                <div style={{color:"#444",fontSize:12,marginTop:6}}>💡 Code donné par votre responsable</div>
              </div>

            {/* EPI alert détaillée */}
            {salarie&&type==="entree"&&epiConfig?.actif&&(()=>{
              const info=getEpiAlertInfo();
              const hardBlocked=isEpiHardBlocked();
              const needed=checkEpiRequired();
              if(!needed&&!hardBlocked)return null;
              return(
                <div style={{background:hardBlocked?"#2a1218":"#2a2010",borderRadius:10,padding:"12px 14px",border:`1px solid ${hardBlocked?"#fc5c6533":"#F7B73133"}`,marginBottom:14,fontSize:12,lineHeight:1.8}}>
                  <div style={{color:hardBlocked?"#fc5c65":"#F7B731",fontWeight:700,marginBottom:4}}>
                    🛡️ {hardBlocked?"⛔ Contrôle EPI obligatoire — Badge bloqué":"⚠️ Contrôle EPI requis"}
                  </div>
                  {info.restants>0&&<div style={{color:"#888"}}>Temps restant : <strong style={{color:"#F7B731"}}>{info.restants} jour{info.restants>1?"s":""}</strong></div>}
                  {info.restants===0&&<div style={{color:"#fc5c65"}}>Délai expiré — pointage bloqué</div>}
                  {info.manquants.length>0&&info.manquants.length<EPI_ITEMS.length&&(
                    <div style={{color:"#888",marginTop:4}}>Éléments manquants : {info.manquants.map(id=>{const item=EPI_ITEMS.find(e=>e.id===id);return item?item.icon+" "+item.label:id}).join(", ")}</div>
                  )}
                  {info.manquants.length===EPI_ITEMS.length&&<div style={{color:"#888",marginTop:4}}>Aucune photo soumise</div>}
                </div>
              );
            })()}

            <div style={{background:"#0B0C14",borderRadius:10,padding:"10px 14px",border:"1px solid #1C1F35",marginBottom:14,fontSize:12,color:"#26de81",textAlign:"center",fontWeight:600}}>
              🛡️ Connexion sécurisée
            </div>
            {gpsInfo&&status==="checking"&&<div style={{color:"#45aaf2",fontSize:12,marginBottom:10,animation:"pulse 1s infinite"}}>📡 {gpsInfo}</div>}
            {error&&<div style={{background:"#2a1515",borderRadius:10,padding:"11px 14px",border:"1px solid #fc5c6533",color:"#fc5c65",fontSize:13,marginBottom:14,lineHeight:1.6,whiteSpace:"pre-line"}}>{error}</div>}
            <button onClick={salarie?()=>pointer():validerCode} disabled={status==="checking"||(!salarie&&!code.trim())} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:status==="checking"?"#2a2a2a":`linear-gradient(135deg,${couleurType},${couleurType}cc)`,color:status==="checking"?"#fff":isEntree?"#0B0C14":"#fff",fontWeight:800,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:status==="checking"?"not-allowed":"pointer",letterSpacing:1,boxShadow:status==="checking"?"none":`0 4px 20px ${couleurType}44`}}>
              {status==="checking"?<><span style={{width:17,height:17,borderRadius:"50%",border:"2px solid #fff3",borderTopColor:isEntree?"#0B0C14":"#fff",display:"inline-block",animation:"spin .7s linear infinite"}}/>Vérification GPS...</>:salarie?(isEntree?"🟢 POINTER MON ARRIVÉE":"🔵 POINTER MON DÉPART"):"VALIDER MON CODE"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PRÉSENCE CHANTIER MODAL ─────────────────────────────────────────────────
function PresenceModal({chantier,pointages,salaries,onClose,onPurgeSalarie}){
  const today=new Date().toDateString();
  const todayP=pointages.filter(p=>p.chantierId===chantier.id&&new Date(p.timestamp).toDateString()===today);
  const historiqueP=pointages.filter(p=>p.chantierId===chantier.id&&new Date(p.timestamp).toDateString()!==today);

  // Grouper par salarié
  const entreeMap={};const sortieSet=new Set();
  todayP.forEach(p=>{
    if(p.type!=="sortie"&&!entreeMap[p.code])entreeMap[p.code]=p;
    if(p.type==="sortie")sortieSet.add(p.code);
  });
  const presents=Object.values(entreeMap).filter(p=>!sortieSet.has(p.code));
  const partis=Object.values(entreeMap).filter(p=>sortieSet.has(p.code));

  // Absents connus
  const connusCodes=new Set(historiqueP.map(p=>p.code));
  const todayCodes=new Set(todayP.map(p=>p.code));
  const absents=[...connusCodes].filter(c=>!todayCodes.has(c)).map(code=>{
    const last=historiqueP.filter(p=>p.code===code).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
    const sal=salaries.find(s=>s.code===code);
    return{code,...last,nom:sal?.nom||last?.nom,prenom:sal?.prenom||last?.prenom};
  });

  function purge(p){
    if(confirm(`Purger les pointages d'aujourd'hui de ${p.prenom} ${p.nom} (${p.code}) sur ${chantier.nom} ?`)){
      onPurgeSalarie(chantier.id,p.code);
    }
  }

  return(
    <Modal onClose={onClose} width={480}>
      <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:4}}>{chantier.nom}</div>
      <div style={{color:"#666",fontSize:13,marginBottom:20}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"})}</div>

      {presents.length>0&&(<div style={{marginBottom:18}}>
        <div style={{color:"#26de81",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>🟢 SUR LE CHANTIER ({presents.length})</div>
        {presents.map(p=>(<div key={p.code} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0f2a1f",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #26de8122"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"#FF5A1F22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:"#FF5A1F",fontFamily:"'Barlow Condensed'"}}>{p.code}</div>
            <div><div style={{fontWeight:700,fontSize:14}}>{p.prenom} {p.nom}</div><div style={{color:"#26de8188",fontSize:12}}>Arrivée à {fmt(p.timestamp)}</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Tag color="#26de81">Présent</Tag>
            <button onClick={()=>purge(p)} title="Purger" style={{background:"#2a1218",border:"1px solid #fc5c6533",borderRadius:8,color:"#fc5c65",padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:600}}>🗑️</button>
          </div>
        </div>))}
      </div>)}

      {partis.length>0&&(<div style={{marginBottom:18}}>
        <div style={{color:"#45aaf2",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>🔵 PARTIS AUJOURD'HUI ({partis.length})</div>
        {partis.map(p=>{const sortie=todayP.find(x=>x.code===p.code&&x.type==="sortie");return(<div key={p.code} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0a1525",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #45aaf222"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"#FF5A1F22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:"#FF5A1F",fontFamily:"'Barlow Condensed'"}}>{p.code}</div>
            <div><div style={{fontWeight:700,fontSize:14}}>{p.prenom} {p.nom}</div><div style={{color:"#45aaf288",fontSize:12}}>Parti à {sortie?fmt(sortie.timestamp):"?"}</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Tag color="#45aaf2">Parti</Tag>
            <button onClick={()=>purge(p)} title="Purger" style={{background:"#2a1218",border:"1px solid #fc5c6533",borderRadius:8,color:"#fc5c65",padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:600}}>🗑️</button>
          </div>
        </div>)})}
      </div>)}

      {absents.length>0&&(<div style={{marginBottom:18}}>
        <div style={{color:"#555",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>⚫ ABSENTS AUJOURD'HUI ({absents.length})</div>
        {absents.map(p=>(<div key={p.code} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0B0C14",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #1C1F35"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"#25284022",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:"#555",fontFamily:"'Barlow Condensed'"}}>{p.code}</div>
            <div><div style={{fontWeight:700,fontSize:14,color:"#555"}}>{p.prenom} {p.nom}</div><div style={{color:"#333",fontSize:12}}>Dernier pointage : {p.timestamp?fmt(p.timestamp,"date"):"?"}</div></div>
          </div>
          <Tag color="#444">Absent</Tag>
        </div>))}
      </div>)}

      {presents.length===0&&partis.length===0&&absents.length===0&&(
        <div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:14}}>Aucun salarié connu sur ce chantier</div>
      )}
      <Btn full onClick={onClose} variant="ghost" style={{marginTop:8}}>Fermer</Btn>
    </Modal>
  );
}

}

function ChantierForm({initial,onSave,onClose}){
  const[form,setForm]=useState(initial||{nom:"",adresse:"",lat:"",lon:"",rayon:200,couleur:"#FF5A1F"});
  const[searchAdresse,setSearchAdresse]=useState(initial?.adresse||"");
  const[suggestions,setSuggestions]=useState([]);
  const[searchStatus,setSearchStatus]=useState(initial?.lat?"selected":"");
  const[gpsStatus,setGpsStatus]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function rechercher(){
    if(!searchAdresse.trim())return;setSearchStatus("loading");setSuggestions([]);
    try{const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(searchAdresse+" France")}&limit=5&lang=fr`);const data=await res.json();
      const results=(data.features||[]).map(f=>{const p=f.properties;const parts=[];if(p.housenumber&&p.street)parts.push(p.housenumber+" "+p.street);else if(p.street)parts.push(p.street);else if(p.name)parts.push(p.name);if(p.postcode)parts.push(p.postcode);if(p.city)parts.push(p.city);return{label:parts.join(", ")||p.name||"Adresse",lat:f.geometry.coordinates[1].toFixed(6),lon:f.geometry.coordinates[0].toFixed(6)}});
      if(results.length===1)choisir(results[0]);else if(results.length>1){setSuggestions(results);setSearchStatus("ok")}else setSearchStatus("error");
    }catch{setSearchStatus("error")}
  }
  function choisir(s){set("adresse",s.label);set("lat",s.lat);set("lon",s.lon);setSearchAdresse(s.label);setSuggestions([]);setSearchStatus("selected")}
  function useGPS(){if(!navigator.geolocation)return;setGpsStatus("loading");navigator.geolocation.getCurrentPosition(p=>{set("lat",p.coords.latitude.toFixed(6));set("lon",p.coords.longitude.toFixed(6));setGpsStatus("ok")},()=>setGpsStatus("error"),{enableHighAccuracy:true,timeout:10000})}
  const ok=form.lat&&form.lon;
  return(<Modal onClose={onClose}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>{initial?.id?"✏️ Modifier":"➕ Nouveau chantier"}</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM *</label><input value={form.nom} onChange={e=>set("nom",e.target.value)} placeholder="Résidence Les Pins"/></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>🔍 ADRESSE</label><div style={{display:"flex",gap:8}}><input value={searchAdresse} onChange={e=>{setSearchAdresse(e.target.value);setSuggestions([]);setSearchStatus("")}} onKeyDown={e=>e.key==="Enter"&&rechercher()} placeholder="12 Rue de la Paix, Lyon" style={{flex:1}}/><button onClick={rechercher} disabled={searchStatus==="loading"} style={{background:"linear-gradient(135deg,#FF5A1F,#FF7A45)",border:"none",borderRadius:10,color:"#fff",padding:"0 16px",fontWeight:700,cursor:"pointer",flexShrink:0}}>{searchStatus==="loading"?"⏳":"🔍"}</button></div>
      {searchStatus==="selected"&&<div style={{marginTop:6,background:"#0f2a1f",borderRadius:8,padding:"10px 14px",border:"1px solid #26de8133",fontSize:13,color:"#26de81"}}>✅ {form.adresse}</div>}
      {suggestions.length>0&&<div style={{marginTop:6,background:"#151724",borderRadius:8,border:"2px solid #FF5A1F",overflow:"hidden"}}>{suggestions.map((s,i)=><div key={i} onClick={()=>choisir(s)} style={{padding:"12px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid #252840":"none",fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#FF5A1F18"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>📍 {s.label}</div>)}</div>}
    </div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>📍 GPS</label><button onClick={useGPS} style={{width:"100%",background:"#151724",border:`1.5px solid ${gpsStatus==="ok"?"#26de81":"#252840"}`,borderRadius:10,color:gpsStatus==="ok"?"#26de81":"#aaa",padding:"11px 14px",fontSize:13,cursor:"pointer"}}>{gpsStatus==="loading"?"⏳ Récupération...":gpsStatus==="ok"?"✅ Position GPS OK":"📍 Utiliser ma position"}</button></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>LAT / LON</label><div style={{display:"flex",gap:10}}><input value={form.lat} onChange={e=>{set("lat",e.target.value);if(e.target.value)setSearchStatus("selected")}} placeholder="48.6291"/><input value={form.lon} onChange={e=>{set("lon",e.target.value)}} placeholder="2.4407"/></div></div>
    {ok&&<div style={{background:"#0f2a1f",borderRadius:8,padding:"8px 14px",border:"1px solid #26de8133",fontSize:13,color:"#26de81"}}>🎯 Position : {parseFloat(form.lat).toFixed(4)}, {parseFloat(form.lon).toFixed(4)}</div>}
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>RAYON (m)</label><input type="number" value={form.rayon} onChange={e=>set("rayon",e.target.value)} min={50} max={1000}/></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:8}}>COULEUR</label><div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{COULEURS.map(c=><div key={c} onClick={()=>set("couleur",c)} style={{width:34,height:34,borderRadius:10,background:c,cursor:"pointer",border:form.couleur===c?"3px solid #fff":"3px solid transparent",transform:form.couleur===c?"scale(1.15)":"scale(1)",transition:"all .15s"}}/>)}</div></div>
  </div><div style={{display:"flex",gap:10,marginTop:22}}><Btn full onClick={()=>{if(!form.nom)return alert("Nom requis");if(!form.lat||!form.lon)return alert("Position GPS requise");onSave({...form,id:initial?.id,lat:parseFloat(form.lat),lon:parseFloat(form.lon),rayon:parseInt(form.rayon)||200})}}>{initial?.id?"💾 Enregistrer":"✅ Créer"}</Btn><Btn full onClick={onClose} variant="ghost">Annuler</Btn></div></Modal>);
}

function SalarieForm({initial,salaries,onSave,onClose,onDelete}){
  const[form,setForm]=useState(initial||{code:"",nom:"",prenom:"",actif:true});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  function autoCode(){
    if(form.prenom&&form.nom){
      const randLetter=()=>"ABCDEFGHJKLMNPQRSTUVWXYZ"[Math.floor(Math.random()*24)];
      const allParts=[...form.prenom.trim().split(/\s+/),...form.nom.trim().split(/\s+/)];
      let initials=allParts.map(w=>w[0]).join("").toUpperCase();
      if(initials.length>=3) initials=initials.slice(0,3);
      else while(initials.length<3) initials+=randLetter();
      let n=1;
      while(salaries.some(s=>s.code.startsWith(initials+String(n).padStart(2,"0"))&&(!initial||s.code!==initial.code)))n++;
      set("code",initials+String(n).padStart(2,"0")+randLetter());
    }
  }
  useEffect(()=>{if(!initial&&form.prenom&&form.nom)autoCode()},[form.prenom,form.nom]);
  return(<Modal onClose={onClose} width={420}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>{initial?"✏️ Modifier":"➕ Nouveau salarié"}</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>PRÉNOM</label><input value={form.prenom} onChange={e=>set("prenom",e.target.value)} placeholder="Jamil"/></div><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM</label><input value={form.nom} onChange={e=>set("nom",e.target.value.toUpperCase())} placeholder="MOHAMMAD"/></div></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>CODE UNIQUE (6 caractères)</label><div style={{display:"flex",gap:8}}><input value={form.code} onChange={e=>set("code",e.target.value.toUpperCase().slice(0,8))} placeholder="AAA99A" style={{letterSpacing:3,fontWeight:700,fontSize:16,textAlign:"center",fontFamily:"'Barlow Condensed'"}}/><Btn small onClick={autoCode} variant="secondary">Auto</Btn></div></div>
    <div style={{display:"flex",alignItems:"center",gap:10}}><label style={{color:"#666",fontSize:12}}>Actif</label><button onClick={()=>set("actif",!form.actif)} style={{width:44,height:24,borderRadius:12,background:form.actif?"#26de81":"#252840",border:"none",position:"relative",cursor:"pointer",transition:"all .2s"}}><div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:2,left:form.actif?22:2,transition:"left .2s"}}/></button><span style={{color:form.actif?"#26de81":"#666",fontSize:12}}>{form.actif?"Oui":"Non"}</span></div>
  </div><div style={{display:"flex",gap:10,marginTop:20}}><Btn full onClick={()=>{if(!form.code||!form.nom||!form.prenom)return alert("Tous les champs sont requis");if(!initial&&salaries.some(s=>s.code===form.code))return alert("Ce code existe déjà");onSave(form)}}>✅ Enregistrer</Btn><Btn full onClick={onClose} variant="ghost">Annuler</Btn></div>
  {initial&&onDelete&&(<div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #252840"}}><Btn full onClick={()=>{if(confirm(`Voulez-vous supprimer la fiche de ${form.prenom} ${form.nom} (${form.code}) ?\n\nCette action est irréversible.`)){onDelete(form.code);onClose()}}} variant="danger">🗑️ Supprimer ce salarié</Btn></div>)}
  </Modal>);
}

function SaisieManuelleModal({chantiers,salaries,onSave,onClose}){
  const[form,setForm]=useState({code:salaries[0]?.code||"",chantierId:chantiers[0]?.id||"",type:"entree",date:new Date().toISOString().slice(0,10),heure:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  function valider(){
    const sal=salaries.find(s=>s.code===form.code);if(!sal)return alert("Code salarié invalide");
    const ch=chantiers.find(c=>c.id==form.chantierId);const[h,m]=form.heure.split(":");
    const ts=new Date(`${form.date}T${h.padStart(2,"0")}:${m.padStart(2,"0")}:00`).toISOString();
    onSave({id:Date.now(),chantierId:ch.id,chantierNom:ch.nom,code:sal.code,nom:sal.nom,prenom:sal.prenom,type:form.type,timestamp:ts,distance:0,manuel:true});
  }
  return(<Modal onClose={onClose} width={440}><div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>✏️ Saisie manuelle</div><div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>SALARIÉ</label><select value={form.code} onChange={e=>set("code",e.target.value)}>{salaries.filter(s=>s.actif).map(s=><option key={s.code} value={s.code}>{s.code} — {s.prenom} {s.nom}</option>)}</select></div>
    <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>CHANTIER</label><select value={form.chantierId} onChange={e=>set("chantierId",e.target.value)}>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select></div>
    <div style={{display:"flex",gap:10}}>{[["entree","🟢 Arrivée"],["sortie","🔵 Départ"]].map(([t,l])=>(<button key={t} onClick={()=>set("type",t)} style={{flex:1,padding:11,borderRadius:8,border:`2px solid ${form.type===t?"#FF5A1F":"#252840"}`,background:form.type===t?"#FF5A1F18":"#0B0C14",color:form.type===t?"#FF5A1F":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>{l}</button>))}</div>
    <div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>DATE</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div><div style={{flex:1}}><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>HEURE</label><input type="time" value={form.heure} onChange={e=>set("heure",e.target.value)}/></div></div>
    <div style={{background:"#1a1010",borderRadius:8,padding:"10px 14px",border:"1px solid #F7B73133",fontSize:12,color:"#F7B731"}}>⚠️ Marqué "Manuel" dans l'historique</div>
  </div><div style={{display:"flex",gap:10,marginTop:20}}><Btn full onClick={valider}>✅ Enregistrer</Btn><Btn full onClick={onClose} variant="ghost">Annuler</Btn></div></Modal>);
}

    return Object.values(map).sort((a,b)=>{const tA=a.sortie?.timestamp||a.entree?.timestamp;const tB=b.sortie?.timestamp||b.entree?.timestamp;return new Date(tB)-new Date(tA)});
  },[todayP]);

  const nbPresents=todayGrouped.filter(g=>g.entree&&!g.sortie).length;

  useEffect(()=>{if(pointages.length>prevCount&&prevCount>0){const n=pointages[0];setToast({msg:`${n.prenom} ${n.nom} ${n.type==="sortie"?"est parti":"vient d'arriver"} !`,sub:`${n.chantierNom} · ${fmt(n.timestamp)}`})}setPrevCount(pointages.length)},[pointages.length]);
  useEffect(()=>{if(showQR){const u=chantiers.find(c=>c.id===showQR.id);if(u)setShowQR(u)}},[chantiers]);

  const filteredP=useMemo(()=>{let l=pointages;if(filterChantier!=="all")l=l.filter(p=>p.chantierId==filterChantier);if(filterDate)l=l.filter(p=>new Date(p.timestamp).toISOString().slice(0,10)===filterDate);return l},[pointages,filterChantier,filterDate]);

        <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>{setRefreshing(true);onRefresh();setLastRefresh(new Date());setTimeout(()=>setRefreshing(false),600)}} style={{background:"#1C1F35",border:"1px solid #252840",borderRadius:10,color:"#888",padding:"7px 12px",fontSize:12,cursor:"pointer"}}><span style={{display:"inline-block",animation:refreshing?"spin .7s linear infinite":"none"}}>🔄</span></button><Btn small onClick={onLogout} variant="ghost">Déco.</Btn></div>
      </div>

              <div key={i} className="card" style={{padding:"14px 16px",cursor:s.tab?"pointer":undefined}} onClick={s.tab?()=>setTab(s.tab):undefined}><div style={{fontSize:20,marginBottom:4}}>{s.i}</div><div style={{fontFamily:"'Bebas Neue'",fontSize:32,color:s.c,lineHeight:1}}>{s.v}</div><div style={{color:"#555",fontSize:11,marginTop:2}}>{s.l}</div></div>

                    <Tag color={pres?"#26de81":"#45aaf2"}>{pres?"Sur site":"Parti"}</Tag>
                  </div>)})}
              </div>}
          </div>
        </div>)}

        {/* ── CHANTIERS ── */}
        {tab==="chantiers"&&(<div className="anim">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>Chantiers & QR Codes</div><Btn onClick={()=>setShowAdd(true)}>➕ Nouveau</Btn></div>
